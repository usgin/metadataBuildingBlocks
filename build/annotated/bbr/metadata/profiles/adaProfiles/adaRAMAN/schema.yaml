$schema: https://json-schema.org/draft/2020-12/schema
title: ADA RAMAN Product Profile
description: Technique-specific profile for Raman Spectroscopy (RAMAN) products. Extends
  the base ADA product profile with constraints on valid RAMAN component types.
allOf:
- $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaProduct/schema.yaml
- type: object
  properties:
    schema:additionalType:
      description: Must include a RAMAN product type identifier.
      contains:
        const: Raman vibrational spectroscopy
    schema:distribution:
      items:
        oneOf:
        - required:
          - componentType
          properties:
            componentType:
              anyOf:
              - properties:
                  '@type':
                    enum:
                    - ada:RAMANRawTabular
              - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaProduct/schema.yaml#/$defs/universalComponentType
        - required:
          - schema:hasPart
          properties:
            schema:hasPart:
              items:
                properties:
                  componentType:
                    anyOf:
                    - properties:
                        '@type':
                          enum:
                          - ada:RAMANRawTabular
                    - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaProduct/schema.yaml#/$defs/universalComponentType
x-jsonld-prefixes:
  schema: http://schema.org/
  ada: https://ada.astromat.org/metadata/
  cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
  csvw: http://www.w3.org/ns/csvw#
  prov: http://www.w3.org/ns/prov#
  spdx: http://spdx.org/rdf/terms#
  nxs: http://purl.org/nexusformat/definitions/
  dcterms: http://purl.org/dc/terms/
  geosparql: http://www.opengis.net/ont/geosparql#
