x-defs: {}
title: DDI-CDI Provenance Activity
description: DDI-CDI native provenance activity. Describes workflows using cdi:Activity,
  cdi:Step, cdi:ProcessingAgent, and cdi:Parameter vocabulary from the DDI Cross-Domain
  Integration specification.
type: object
properties:
  '@type':
    description: Must be or include cdi:Activity
    anyOf:
    - type: string
      enum:
      - cdi:Activity
    - type: array
      items:
        type: string
      contains:
        enum:
        - cdi:Activity
  '@id':
    type: string
    description: Identifier for this activity node
  cdi:name:
    description: Structured name for the activity (ObjectName)
    anyOf:
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/ObjectName
    - type: array
      items:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/ObjectName
  cdi:description:
    type: string
    description: Plain text description of the activity
  cdi:displayLabel:
    description: Multilingual display label
    anyOf:
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/LabelForDisplay
    - type: array
      items:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/LabelForDisplay
  cdi:identifier:
    description: Formal identifier for this activity
    allOf:
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/Identifier
  cdi:entityUsed:
    description: Entities used as inputs by this activity
    type: array
    items:
      $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/Reference
  cdi:entityProduced:
    description: Entities produced as outputs by this activity
    type: array
    items:
      $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/Reference
  cdi:hasSubActivity:
    description: Nested sub-activities within this activity (cdi:Activity). Use @id
      references to Activity nodes defined elsewhere in the graph.
    type: array
    items:
      $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/id-reference
  cdi:has_Step:
    description: Ordered steps within this activity (cdi:Step)
    type: array
    items:
      anyOf:
      - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/Step
      - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/id-reference
  cdi:standardModelMapping:
    description: Reference to a standard process model (e.g. GSBPM)
    anyOf:
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/Reference
    - type: array
      items:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/Reference
required:
- '@type'
- cdi:name
$defs:
  id-reference:
    type: object
    description: JSON-LD @id reference to a node defined elsewhere in the graph
    properties:
      '@id':
        type: string
        description: IRI or blank node identifier of the referenced node
    required:
    - '@id'
  ObjectName:
    type: object
    description: DDI-CDI structured name wrapper (dt-ObjectName)
    properties:
      '@type':
        anyOf:
        - type: string
          enum:
          - cdi:ObjectName
        - type: array
          items:
            type: string
          contains:
            enum:
            - cdi:ObjectName
      cdi:name:
        type: string
        description: The name string
      cdi:context:
        description: Context or usage of this name
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/ControlledVocabularyEntry
    required:
    - cdi:name
  LabelForDisplay:
    type: object
    description: DDI-CDI multilingual display label (dt-LabelForDisplay)
    properties:
      '@type':
        anyOf:
        - type: string
          enum:
          - cdi:LabelForDisplay
        - type: array
          items:
            type: string
          contains:
            enum:
            - cdi:LabelForDisplay
      cdi:locationVariant:
        description: Geographic or locale variant
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/ControlledVocabularyEntry
      cdi:maxLength:
        type: integer
        description: Maximum display length
      cdi:languageSpecificString:
        description: The label text with language tag
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/LanguageString
  LanguageString:
    type: object
    description: DDI-CDI language-tagged string (dt-LanguageString)
    properties:
      '@type':
        anyOf:
        - type: string
          enum:
          - cdi:LanguageString
        - type: array
          items:
            type: string
          contains:
            enum:
            - cdi:LanguageString
      cdi:content:
        type: string
        description: The text content
      cdi:language:
        type: string
        description: ISO language code (e.g. en, fr, de)
    required:
    - cdi:content
  Identifier:
    type: object
    description: DDI-CDI composite identifier (dt-Identifier)
    properties:
      '@type':
        anyOf:
        - type: string
          enum:
          - cdi:Identifier
        - type: array
          items:
            type: string
          contains:
            enum:
            - cdi:Identifier
      cdi:ddiIdentifier:
        description: DDI-specific IRDI identifier
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/InternationalRegistrationDataIdentifier
      cdi:uri:
        type: string
        format: uri
        description: URI form of the identifier
      cdi:nonDdiIdentifier:
        description: Non-DDI identifier
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/NonDdiIdentifier
        - type: array
          items:
            $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/NonDdiIdentifier
  InternationalRegistrationDataIdentifier:
    type: object
    description: DDI-CDI IRDI (dt-InternationalRegistrationDataIdentifier)
    properties:
      '@type':
        anyOf:
        - type: string
          enum:
          - cdi:InternationalRegistrationDataIdentifier
        - type: array
          items:
            type: string
          contains:
            enum:
            - cdi:InternationalRegistrationDataIdentifier
      cdi:dataIdentifier:
        type: string
      cdi:registrationAuthorityIdentifier:
        type: string
      cdi:versionIdentifier:
        type: string
    required:
    - cdi:dataIdentifier
    - cdi:registrationAuthorityIdentifier
    - cdi:versionIdentifier
  NonDdiIdentifier:
    type: object
    description: Non-DDI identifier (dt-NonDdiIdentifier)
    properties:
      '@type':
        anyOf:
        - type: string
          enum:
          - cdi:NonDdiIdentifier
        - type: array
          items:
            type: string
          contains:
            enum:
            - cdi:NonDdiIdentifier
      cdi:identifierContent:
        type: string
        description: The identifier value
      cdi:managingAgency:
        type: string
        description: Agency managing this identifier scheme
    required:
    - cdi:identifierContent
  Reference:
    type: object
    description: DDI-CDI reference to an entity (dt-Reference)
    properties:
      '@type':
        anyOf:
        - type: string
          enum:
          - cdi:Reference
        - type: array
          items:
            type: string
          contains:
            enum:
            - cdi:Reference
      cdi:uri:
        type: string
        format: uri
        description: URI of the referenced entity
      cdi:description:
        type: string
        description: Human-readable description of the reference
      cdi:ddiReference:
        description: DDI IRDI reference
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/InternationalRegistrationDataIdentifier
      cdi:semantic:
        description: Semantic role of this reference
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/ControlledVocabularyEntry
  Step:
    type: object
    description: DDI-CDI Step within an Activity (cls-Step, extends Activity)
    properties:
      '@type':
        anyOf:
        - type: string
          enum:
          - cdi:Step
        - type: array
          items:
            type: string
          contains:
            enum:
            - cdi:Step
      '@id':
        type: string
        description: Identifier for this step node
      cdi:name:
        description: Structured name for the step
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/ObjectName
        - type: array
          items:
            $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/ObjectName
      cdi:description:
        type: string
        description: Plain text description of the step
      cdi:identifier:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/Identifier
      cdi:script:
        description: Executable script or code for this step
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/CommandCode
      cdi:scriptingLanguage:
        description: Programming or scripting language used
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/ControlledVocabularyEntry
      cdi:receives:
        description: Input parameters received by this step (cdi:Parameter)
        type: array
        items:
          anyOf:
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/Parameter
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/id-reference
      cdi:produces:
        description: Output parameters produced by this step (cdi:Parameter)
        type: array
        items:
          anyOf:
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/Parameter
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/id-reference
      cdi:entityUsed:
        description: Entities used as inputs by this step
        type: array
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/Reference
      cdi:entityProduced:
        description: Entities produced as outputs by this step
        type: array
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/Reference
      cdi:hasSubStep:
        description: Nested sub-steps (cdi:Step)
        type: array
        items:
          anyOf:
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/Step
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/id-reference
    required:
    - '@type'
    - cdi:name
  CommandCode:
    type: object
    description: DDI-CDI executable code reference (dt-CommandCode)
    properties:
      '@type':
        anyOf:
        - type: string
          enum:
          - cdi:CommandCode
        - type: array
          items:
            type: string
          contains:
            enum:
            - cdi:CommandCode
      cdi:description:
        type: string
        description: Description of the code
      cdi:commandFile:
        description: External script file reference
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/CommandFile
        - type: array
          items:
            $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/CommandFile
      cdi:command:
        description: Inline command content
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/Command
        - type: array
          items:
            $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/Command
  Command:
    type: object
    description: DDI-CDI individual command statement (dt-Command)
    properties:
      '@type':
        anyOf:
        - type: string
          enum:
          - cdi:Command
        - type: array
          items:
            type: string
          contains:
            enum:
            - cdi:Command
      cdi:commandContent:
        type: string
        description: The command or code text
      cdi:programLanguage:
        description: Language of this command
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/ControlledVocabularyEntry
  CommandFile:
    type: object
    description: DDI-CDI external script file (dt-CommandFile)
    properties:
      '@type':
        anyOf:
        - type: string
          enum:
          - cdi:CommandFile
        - type: array
          items:
            type: string
          contains:
            enum:
            - cdi:CommandFile
      cdi:uri:
        type: string
        format: uri
        description: URI of the script file
      cdi:location:
        type: string
        description: Human-readable file location
  ControlledVocabularyEntry:
    type: object
    description: DDI-CDI controlled vocabulary entry (dt-ControlledVocabularyEntry)
    properties:
      '@type':
        anyOf:
        - type: string
          enum:
          - cdi:ControlledVocabularyEntry
        - type: array
          items:
            type: string
          contains:
            enum:
            - cdi:ControlledVocabularyEntry
      cdi:entryValue:
        type: string
        description: The vocabulary code or value
      cdi:name:
        type: string
        description: Human-readable name
      cdi:vocabulary:
        description: Reference to the vocabulary scheme
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/Reference
  Parameter:
    type: object
    description: DDI-CDI parameter for step data flow (cls-Parameter)
    properties:
      '@type':
        anyOf:
        - type: string
          enum:
          - cdi:Parameter
        - type: array
          items:
            type: string
          contains:
            enum:
            - cdi:Parameter
      '@id':
        type: string
        description: Identifier for this parameter node
      cdi:name:
        description: Structured name for the parameter
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/ObjectName
        - type: array
          items:
            $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/ObjectName
      cdi:identifier:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/Identifier
      cdi:entityBound:
        description: Reference to the entity this parameter is bound to
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/Reference
        - type: array
          items:
            $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/Reference
    required:
    - '@type'
    - cdi:name
  ProcessingAgent:
    type: object
    description: DDI-CDI agent that performs activities (cls-ProcessingAgent)
    properties:
      '@type':
        anyOf:
        - type: string
          enum:
          - cdi:ProcessingAgent
        - type: array
          items:
            type: string
          contains:
            enum:
            - cdi:ProcessingAgent
      '@id':
        type: string
        description: Identifier for this agent node
      cdi:identifier:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/Identifier
      cdi:purpose:
        type: string
        description: Purpose or role description of this agent
      cdi:performs:
        description: Activities this agent performs (cdi:Activity). Use @id references
          to Activity nodes defined elsewhere in the graph.
        type: array
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/id-reference
      cdi:operatesOn:
        description: Production environments this agent operates on (cdi:ProductionEnvironment)
        type: array
        items:
          anyOf:
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/ProductionEnvironment
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/id-reference
    required:
    - '@type'
  ProductionEnvironment:
    type: object
    description: DDI-CDI production environment (cls-ProductionEnvironment)
    properties:
      '@type':
        anyOf:
        - type: string
          enum:
          - cdi:ProductionEnvironment
        - type: array
          items:
            type: string
          contains:
            enum:
            - cdi:ProductionEnvironment
      '@id':
        type: string
        description: Identifier for this environment node
      cdi:name:
        description: Structured name for the environment
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/ObjectName
        - type: array
          items:
            $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/ObjectName
      cdi:description:
        type: string
        description: Description of the environment
      cdi:identifier:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/Identifier
      cdi:displayLabel:
        description: Multilingual display label
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/LabelForDisplay
        - type: array
          items:
            $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiProv/schema-oas3.0.yaml#/$defs/LabelForDisplay
    required:
    - '@type'
    - cdi:name
x-jsonld-prefixes:
  cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
x-schema-version: https://json-schema.org/draft/2020-12/schema
