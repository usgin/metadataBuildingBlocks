title: DDI-CDI Value Domain
description: Unified DDI-CDI ValueDomain building block covering both SubstantiveValueDomain
  (subject-matter values) and SentinelValueDomain (processing/missing-value codes).
  Both inherit from ValueDomain. SentinelValueDomain adds an optional cdi:platformType
  property. Supports described domains (ValueAndConceptDescription), enumerated domains
  (EnumerationDomain), and conceptual domain references.
anyOf:
- description: Single ValueDomain node
  allOf:
  - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/ValueDomainNode
- description: Unwrapped @graph array of nodes
  type: array
  items:
    $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/ValueDomainNode
- description: JSON-LD document with @context and @graph
  type: object
  properties:
    '@context': {}
    '@graph':
      type: array
      items:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/ValueDomainNode
  required:
  - '@graph'
$defs:
  ValueDomainNode:
    type: object
    description: A single ValueDomain node (SubstantiveValueDomain or SentinelValueDomain)
    properties:
      '@type':
        description: Must include either cdi:SubstantiveValueDomain or cdi:SentinelValueDomain
        type: array
        items:
          type: string
        anyOf:
        - contains:
            enum:
            - cdi:SubstantiveValueDomain
        - contains:
            enum:
            - cdi:SentinelValueDomain
        minItems: 1
      '@id':
        type: string
        description: Identifier for this value domain node
      cdi:catalogDetails:
        description: Administrative catalog metadata for this value domain
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/CatalogDetails
      cdi:displayLabel:
        description: Multilingual display label
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/LabelForDisplay
        - type: array
          items:
            $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/LabelForDisplay
      cdi:identifier:
        description: Formal identifier for this value domain
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/Identifier
      cdi:recommendedDataType:
        description: Recommended physical data type for values in this domain
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/ControlledVocabularyEntry
      cdi:isDescribedBy:
        description: Description of the value domain constraints (0..1). Inline ValueAndConceptDescription
          or @id reference.
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/ValueAndConceptDescription
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/id-reference
      cdi:takesValuesFrom:
        description: Enumeration domain providing the set of permissible coded values
          (0..1). Inline EnumerationDomain or @id reference.
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/EnumerationDomain
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/id-reference
      cdi:takesConceptsFrom:
        description: Reference to a conceptual domain (SubstantiveConceptualDomain
          or SentinelConceptualDomain) that provides conceptual grounding for this
          value domain (0..1). @id reference only.
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/id-reference
      cdi:platformType:
        description: '(SentinelValueDomain only) The type of software platform under
          which sentinel codes will be used. Statistical software platforms use different
          sets of codes to indicate missing values. Example values: SASNumeric, SPSSstyle,
          Rstyle, StataNumeric, BlankString, EmptyString, Unrestricted.'
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/ControlledVocabularyEntry
    required:
    - '@type'
  ValueAndConceptDescription:
    type: object
    description: DDI-CDI description of value constraints and measurement level (cls-ValueAndConceptDescription)
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdi:ValueAndConceptDescription
        minItems: 1
      '@id':
        type: string
        description: Identifier for this description node
      cdi:classificationLevel:
        type: string
        description: Level of measurement
        enum:
        - Continuous
        - Interval
        - Nominal
        - Ordinal
        - Ratio
      cdi:description:
        description: Textual description of the value domain constraints
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/InternationalString
      cdi:formatPattern:
        description: Expected format pattern for values
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/ControlledVocabularyEntry
      cdi:identifier:
        description: Formal identifier
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/Identifier
      cdi:logicalExpression:
        description: Logical expression constraining valid values
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/ControlledVocabularyEntry
      cdi:maximumValueExclusive:
        type: string
        description: Exclusive upper bound for valid values
      cdi:maximumValueInclusive:
        type: string
        description: Inclusive upper bound for valid values
      cdi:minimumValueExclusive:
        type: string
        description: Exclusive lower bound for valid values
      cdi:minimumValueInclusive:
        type: string
        description: Inclusive lower bound for valid values
      cdi:regularExpression:
        description: Regular expression constraining valid value syntax
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/TypedString
  TypedString:
    type: object
    description: DDI-CDI typed string value (dt-TypedString)
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdi:TypedString
        minItems: 1
      cdi:content:
        type: string
        description: The string content
      cdi:typeOfContent:
        description: Type or format of the content
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/ControlledVocabularyEntry
  EnumerationDomain:
    type: object
    description: DDI-CDI enumeration domain providing a set of permissible coded values
      (cls-EnumerationDomain)
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdi:EnumerationDomain
        minItems: 1
      '@id':
        type: string
        description: Identifier for this enumeration domain node
      cdi:identifier:
        description: Formal identifier
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/Identifier
      cdi:name:
        description: Structured name for this enumeration domain
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/ObjectName
        - type: array
          items:
            $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/ObjectName
      cdi:purpose:
        description: Purpose of this enumeration domain
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/InternationalString
      cdi:uses:
        description: Reference to a LevelStructure that organizes the enumeration.
          @id reference only.
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/id-reference
      cdi:isDefinedBy:
        description: References to Concepts that define the enumerated values. Array
          of @id references.
        type: array
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/id-reference
      cdi:references:
        description: Reference to the CategorySet providing the value categories.
          @id reference only.
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/id-reference
