            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/InternationalString
          cdi:isFormal:
            type: boolean
            default: true
            description: Whether this is a formal name
          cdi:isPreferred:
            type: boolean
            default: false
            description: Whether this is the preferred name
          cdi:effectiveDates:
            description: Date range when this name is/was effective
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/DateRange
          cdi:context:
