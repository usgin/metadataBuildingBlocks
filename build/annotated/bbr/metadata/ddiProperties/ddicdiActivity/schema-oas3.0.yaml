x-defs:
  cdif.bbr.metadata.ddiProperties.ddicdiDataTypes:
    title: DDI-CDI Data Types
    description: Shared DDI-CDI structured data types from DDICDILibrary/DataTypes.
      Provides reusable $defs for identifiers, names, contact information, references,
      and other common DDI-CDI structured data types.
    $defs:
      id-reference:
        type: object
        description: JSON-LD @id reference to a node defined elsewhere in the graph
        properties:
          '@id':
            type: string
            description: IRI or blank node identifier of the referenced node
        required:
        - '@id'
      ObjectName:
        type: object
        description: DDI-CDI structured name wrapper (dt-ObjectName)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:ObjectName
            minItems: 1
          cdi:name:
            type: string
            description: The name string
          cdi:context:
            description: Context or usage of this name
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/ControlledVocabularyEntry
        required:
        - cdi:name
      OrganizationName:
        type: object
        description: DDI-CDI organization name (dt-OrganizationName, extends ObjectName)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:OrganizationName
            minItems: 1
          cdi:name:
            type: string
            description: The name string
          cdi:context:
            description: Context or usage of this name
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/ControlledVocabularyEntry
          cdi:abbreviation:
            description: Abbreviated form of the name
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/InternationalString
          cdi:effectiveDates:
            description: Date range when this name is/was effective
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/DateRange
          cdi:isFormal:
            type: boolean
            default: true
            description: Whether this is the formal/legal name
          cdi:typeOfOrganizationName:
            description: Classification of this name (e.g. legal, trade, acronym)
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/ControlledVocabularyEntry
        required:
        - cdi:name
      IndividualName:
        type: object
        description: DDI-CDI individual name (dt-IndividualName)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:IndividualName
            minItems: 1
          cdi:firstGiven:
            type: string
            description: First or given name
          cdi:lastFamily:
            type: string
            description: Last or family name
          cdi:middle:
            type: string
            description: Middle name(s)
          cdi:prefix:
            type: string
            description: Name prefix (e.g. Dr., Prof.)
          cdi:suffix:
            type: string
            description: Name suffix (e.g. Jr., III)
          cdi:fullName:
            description: Full name as a single internationalized string
