title: ECRR Common optional metadata
description: Commonly used optional properties shared across multiple ECRR resource
  types. Includes identifiers, agents (creator, contributor, publisher, editor), keywords,
  science domains (about), audience, related resources, funding, and citations.
type: object
properties:
  schema:identifier:
    description: External identifier for the resource (e.g. DOI, ARK). Use PropertyValue
      pattern to specify identifier scheme and resolver URL.
    anyOf:
    - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ecrrProperties/ecrrCommon/schema-oas3.0.yaml#/$defs/Identifier
    - type: string
  schema:url:
    type: string
    format: uri
    description: URL of a landing page or web resource describing the resource.
  schema:datePublished:
    type: string
    description: ISO 8601 formatted date when the resource was published or released.
  schema:version:
    description: Version number or identifier for this resource.
    anyOf:
    - type: string
    - type: number
  schema:alternateName:
    description: Alternative names by which the resource is known.
    anyOf:
    - type: string
    - type: array
      items:
        type: string
  schema:sameAs:
    description: Other identifiers or URIs for the same resource.
    type: array
    items:
      type: string
  schema:creator:
    description: Authors or originators of the resource content. Array of Person or
      Organization objects. Use @list wrapper to preserve author order in JSON-LD.
    type: array
    items:
      anyOf:
      - type: object
        properties:
          '@id':
            type: string
            description: reference to an agent defined elsewhere
      - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ecrrProperties/ecrrCommon/schema-oas3.0.yaml#/$defs/Person
      - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ecrrProperties/ecrrCommon/schema-oas3.0.yaml#/$defs/Organization
  schema:contributor:
    description: Other parties who contributed to the resource.
    type: array
    items:
      anyOf:
      - type: object
        properties:
          '@id':
            type: string
      - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ecrrProperties/ecrrCommon/schema-oas3.0.yaml#/$defs/Person
      - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ecrrProperties/ecrrCommon/schema-oas3.0.yaml#/$defs/Organization
  schema:publisher:
    description: Party that made the resource publicly available.
    anyOf:
    - type: object
      properties:
        '@id':
          type: string
    - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ecrrProperties/ecrrCommon/schema-oas3.0.yaml#/$defs/Person
    - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ecrrProperties/ecrrCommon/schema-oas3.0.yaml#/$defs/Organization
  schema:editor:
    description: Editors of the resource.
    type: array
    items:
      anyOf:
      - type: object
        properties:
          '@id':
            type: string
      - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ecrrProperties/ecrrCommon/schema-oas3.0.yaml#/$defs/Person
      - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ecrrProperties/ecrrCommon/schema-oas3.0.yaml#/$defs/Organization
  schema:funding:
    description: Funding sources and grants that supported the resource.
    type: array
    items:
      $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ecrrProperties/ecrrCommon/schema-oas3.0.yaml#/$defs/Funder
  schema:keywords:
    description: Free-text keywords describing the resource content.
    anyOf:
    - type: string
    - type: array
      items:
        type: string
  schema:about:
    description: Science domains that the resource addresses. Array of DefinedTerm
      objects referencing the ECRR ADO (Academic Discipline Ontology) vocabulary.
    type: array
    items:
      $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ecrrProperties/ecrrCommon/schema-oas3.0.yaml#/$defs/DefinedTerm
  schema:audience:
    description: Target user communities for the resource. Array of Audience objects
      with audienceType labels and identifiers from the AUT vocabulary.
    type: array
    items:
      type: object
      properties:
        '@type':
          type: string
          default: schema:Audience
          enum:
          - schema:Audience
        schema:audienceType:
          type: string
          description: Label for the target audience (e.g. Data Producers, Scientists,
            Developers). Values from ECRR AUT vocabulary.
        schema:identifier:
          type: string
          description: URI from the ECRR AUT_ vocabulary.
      required:
      - '@type'
      - schema:audienceType
  schema:subjectOf:
    description: Links to formal metadata records or web pages about this resource.
      Array of labeled links (CreativeWork objects with name and url).
    anyOf:
    - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ecrrProperties/ecrrCommon/schema-oas3.0.yaml#/$defs/LabeledLink
    - type: array
      items:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ecrrProperties/ecrrCommon/schema-oas3.0.yaml#/$defs/LabeledLink
  schema:isRelatedTo:
    description: Related resources such as documentation, publications, or tools.
      Array of labeled links.
    type: array
    items:
      $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ecrrProperties/ecrrCommon/schema-oas3.0.yaml#/$defs/LabeledLink
  schema:isBasedOn:
    description: Resources (e.g. semantic resources, specifications) that this resource
      is based on or derived from. Array of labeled links.
    type: array
    items:
      $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ecrrProperties/ecrrCommon/schema-oas3.0.yaml#/$defs/LabeledLink
  schema:encodingFormat:
    description: Representation formats for the resource content (e.g. MIME types,
      format names like RDF/XML, Turtle, JSON-LD).
    type: array
    items:
      type: string
  dct:bibliographicCitation:
    description: Preferred bibliographic citation for the resource, encoded as a PropertyValue
      with propertyID of dct:bibliographicCitation.
    type: object
    properties:
      '@type':
        type: string
        default: schema:PropertyValue
        enum:
        - schema:PropertyValue
      schema:propertyID:
        type: string
        enum:
        - dct:bibliographicCitation
      schema:name:
        type: string
        default: Bibliographic citation
      schema:value:
        type: string
    required:
    - '@type'
    - schema:propertyID
    - schema:value
  dct:conformsTo:
    description: Specifications or standards that the resource conforms to. Array
      of labeled links.
    type: array
    items:
      $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ecrrProperties/ecrrCommon/schema-oas3.0.yaml#/$defs/LabeledLink
$defs:
  LabeledLink:
    $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ecrrProperties/ecrrCommon/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.labeledLink
  Identifier:
    $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ecrrProperties/ecrrCommon/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
  DefinedTerm:
    $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ecrrProperties/ecrrCommon/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.definedTerm
  Person:
    $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ecrrProperties/ecrrCommon/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.person
  Organization:
    $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ecrrProperties/ecrrCommon/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.organization
  Funder:
    $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ecrrProperties/ecrrCommon/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.funder
