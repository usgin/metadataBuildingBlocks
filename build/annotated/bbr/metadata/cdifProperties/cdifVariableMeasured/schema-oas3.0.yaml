description: Extends cdif variableMeasured with properties for DDI-CDI InstanceVariable
anyOf:
- description: Single node (InstanceVariable or Dataset)
  type: object
  anyOf:
  - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifVariableMeasured/schema-oas3.0.yaml#/$defs/CdifVariableMeasuredNode
  - type: object
    description: Dataset node referencing variableMeasured items
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - schema:Dataset
- description: Unwrapped @graph array of nodes
  type: array
  items:
    anyOf:
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifVariableMeasured/schema-oas3.0.yaml#/$defs/CdifVariableMeasuredNode
    - type: object
      description: Dataset node referencing variableMeasured items
      properties:
        '@type':
          type: array
          items:
            type: string
          contains:
            enum:
            - schema:Dataset
- description: JSON-LD document with @context and @graph
  type: object
  properties:
    '@context': {}
    '@graph':
      type: array
      items:
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifVariableMeasured/schema-oas3.0.yaml#/$defs/CdifVariableMeasuredNode
        - type: object
          description: Dataset node referencing variableMeasured items
          properties:
            '@type':
              type: array
              items:
                type: string
              contains:
                enum:
                - schema:Dataset
  required:
  - '@graph'
$defs:
  DefinedTerm:
    $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifVariableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.definedTerm
  CdifVariableMeasuredNode:
    type: object
    properties:
      '@type':
        type: array
        description: Must include both schema:PropertyValue and cdi:InstanceVariable.
          Additional types may be included.
        items:
          type: string
        contains:
          enum:
          - cdi:InstanceVariable
      cdi:identifier:
        type: string
      cdi:physicalDataType:
        type: array
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: reference to a skos concept for the data type
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifVariableMeasured/schema-oas3.0.yaml#/$defs/DefinedTerm
        description: identifier or name for the data type concept.
      cdi:intendedDataType:
        type: string
        description: The intended data type for values of this variable, from DDI-CDI
          RepresentedVariable.hasIntendedDataType. Recommended values are XML Schema
          datatypes (e.g. https://www.w3.org/TR/xmlschema-2/#decimal).
      cdi:role:
        type: string
        enum:
        - MeasureComponent
        - AttributeComponent
        - DimensionComponent
        - DescriptorComponent
        - ReferenceValueComponent
        description: Specifies the relation of the variable to the data structure,
          corresponding to DDI-CDI DataStructureComponent subtypes.
      cdi:describedUnitOfMeasure:
        description: A structured unit of measure from a controlled vocabulary, from
          DDI-CDI RepresentedVariable.describedUnitOfMeasure.
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifVariableMeasured/schema-oas3.0.yaml#/$defs/DefinedTerm
      cdi:simpleUnitOfMeasure:
        anyOf:
        - type: string
        - type: object
          properties:
            '@id':
              type: string
              description: reference to a skos concept for the data type
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifVariableMeasured/schema-oas3.0.yaml#/$defs/DefinedTerm
      cdi:uses:
        type: array
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: reference to a skos concept for the property
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifVariableMeasured/schema-oas3.0.yaml#/$defs/DefinedTerm
        description: Essentially the same as schema:propertyID. References to concepts
          that this variable measures or represents.
      cdi:name:
        type: string
        description: DDI-CDI Concept.name. The name of this variable in the DDI-CDI
          model.
      cdi:displayLabel:
        type: string
        description: DDI-CDI Concept.displayLabel. A human-readable label for display
          purposes.
      cdi:qualifies:
        type: object
        properties:
          '@id':
            type: string
        description: reference to an instance variable defined for this dataset
    allOf:
    - required:
      - '@type'
    - anyOf:
      - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifVariableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.variableMeasured
      - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifVariableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.statisticalVariable
