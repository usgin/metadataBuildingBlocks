  cdif.bbr.metadata.schemaorgProperties.variableMeasured:
    description: Schema.org PropertyValue-based variableMeasured. Defines properties
      for a measured variable in a dataset, typed as schema:PropertyValue.
    type: object
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - schema:PropertyValue
        minItems: 1
      '@id':
        type: string
      schema:name:
        type: string
        description: string label associated with the variable in the dataset serialization
      schema:description:
        type: string
        default: missing
      schema:alternateName:
        type: array
        items:
          type: string
          description: human intelligible name for variable that conveys semantics
      schema:measurementTechnique:
        anyOf:
        - type: string
        - type: object
          properties:
            '@id':
              type: string
              description: reference to a skos concept
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifVariableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.variableMeasured/$defs/DefinedTerm
        description: Text description or URI identifying the measurement method.
      schema:propertyID:
        type: array
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifVariableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.variableMeasured/$defs/DefinedTerm
        description: identifier or name for the property concept
      schema:unitText:
        type: string
        description: unit of measurement as text
      schema:unitCode:
        anyOf:
        - type: string
        - type: object
          properties:
            '@id':
              type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifVariableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.variableMeasured/$defs/DefinedTerm
        description: URI or code identifying the unit of measure
      schema:minValue:
        type: number
        description: minimum numeric value in the dataset
      schema:maxValue:
        type: number
        description: maximum numeric value in the dataset
      schema:url:
        type: string
        format: uri
        description: link to a web page useful for interpreting the variable
    required:
    - '@type'
    - schema:name
    $defs:
      DefinedTerm:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifVariableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.definedTerm
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.schemaorgProperties.statisticalVariable:
    description: A statistical variable description using schema.org/StatisticalVariable.
      Defines a variable that represents a statistical measure, such as median income
      or unemployment rate.
    type: object
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - schema:StatisticalVariable
        minItems: 1
      '@id':
        type: string
      schema:name:
        type: string
        description: string label for the statistical variable
      schema:description:
        type: string
      schema:alternateName:
        type: array
        items:
          type: string
          description: human intelligible name for variable that conveys semantics
      schema:measurementTechnique:
        anyOf:
        - type: string
        - type: object
          properties:
            '@id':
              type: string
              description: reference to a skos concept
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifVariableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.statisticalVariable/$defs/DefinedTerm
        description: Text description or URI identifying the measurement method.
      schema:statType:
        anyOf:
        - type: string
        - type: object
          properties:
            '@id':
              type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifVariableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.statisticalVariable/$defs/DefinedTerm
      schema:measuredProperty:
        type: object
        properties:
          '@id':
            type: string
            description: reference to a skos concept for the property
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - schema:Property
            minItems: 1
          schema:name:
            anyOf:
            - type: string
            - type: object
              properties:
                '@id':
                  type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifVariableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.statisticalVariable/$defs/DefinedTerm
    required:
    - '@type'
    - schema:name
    - schema:measuredProperty
    $defs:
      DefinedTerm:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifVariableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.definedTerm
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/statisticalVariable/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.schemaorgProperties.identifier:
    description: Properties for a schema.org identifier
    type: object
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - schema:PropertyValue
        minItems: 1
      schema:propertyID:
        type: string
        description: In this context for the schema:PropertyValue, this field is an
          identifier for the identifier schema, e.g. DOI, ARK.  Get values from https://registry.identifiers.org/registry/
          for interoperability
      schema:value:
        type: string
        description: the identifier string. E.g. 10.5066/F7VX0DMQ
      schema:url:
        type: string
        format: uri
        description: 'web-resolveable string for the identifier; host name part is
          location of a resolver that will return some representation for the given
          identifier value. E.g. https://doi.org/10.5066/F7VX0DMQ '
    allOf:
    - required:
