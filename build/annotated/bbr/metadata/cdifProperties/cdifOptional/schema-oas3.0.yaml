    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.schemaorgProperties.action:
    title: 'Action '
    type: object
    description: 'this element defines an action (operation) that can be invoked via
      messages using the protocol defined. In most cases this will be an http request
      via TCP/IP, but in desktop or LAN environments, other protocols might be used.
      The target property defines the endpoint and syntax for invoking the action.
      Result specifies the encoding format for the (possible) response(s) when the
      action is invoked. Object specifies the information model for the resource that
      is the object of the action. This approach is an adoptation of the Action Blog
      Post from schema.org (see https://schema.org/docs/actions.html, and https://github.com/schemaorg/suggestions-questions-brainstorming/issues/62) '
    properties:
      '@type':
        type: string
        description: The type of action. Must be schema:Action or one of its subtypes.
        default: schema:Action
        enum:
        - schema:Action
        - schema:AssessAction
        - schema:ConsumeAction
        - schema:ControlAction
        - schema:CreateAction
        - schema:FindAction
        - schema:InteractAction
        - schema:MoveAction
        - schema:PlayAction
        - schema:SearchAction
        - schema:TransferAction
        - schema:UpdateAction
      schema:name:
        type: string
        description: text label for the action
      schema:target:
        description: specifies the request target location and request syntax
        allOf:
        - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.action/$defs/target_type
      schema:result:
        description: specifies the serialization scheme (encoding format, information
          model) for expected representation of the data
        allOf:
        - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.action/$defs/result_type
      schema:object:
        description: specification of information model/schema for target resource.
          Only necessary if the request allow specifying the fields to include in
          the response
        allOf:
        - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.action/$defs/object_type
      schema:query-input:
        description: set of explanations of the parameters in the URL template for
          the target.
        allOf:
        - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.action/$defs/query-input_type
    required:
    - schema:name
    - schema:target
    $defs:
      target_type:
        type: object
        description: documentation of the URL end point and syntax to invoke the service.
          This schema doesn't handle post requests
        properties:
          '@type':
            type: string
            default: schema:EntryPoint
            enum:
            - schema:EntryPoint
          schema:description:
            type: string
          schema:urlTemplate:
            type: string
            description: 'a templated URL; parameters are enclosed in curly braces
              ({..}); parameters are not required. If included, parameters MUST be
              documented in the query-input element. Template should be consitent
              with URI Template (https://datatracker.ietf.org/doc/html/rfc6570) examples:
              - http://portal.chordsrt.com/api/v1/data.{encoding}; single parameter
              - http://portal.chordsrt.com/api/v1/data.{encoding}?instruments={instruments}&start={start}&end={end}
              ; multiple parameters - {endpoint}{encoding}; endpoint URL path is a
              parameter,should only appear in potential actions for API specification
              descriptions, which are generic-not specific to a particular endpoint.'
          schema:httpMethod:
            title: HTTP Method
            description: only applicable if protocol is http or a protocol that tunnels
              on http
            type: array
            items:
              type: string
              default: GET
              enum:
              - GET
              - PUT
              - POST
              - PATCH
              - DELETE
              - COPY
              - HEAD
              - OPTIONS
              - PROPFIND
          schema:contentType:
            type: array
            description: The supported content type(s) for an EntryPoint response.
              a MIME type (https://www.iana.org/assignments/media-types/media-types.xhtml)
              that specifies the content type for messages in resonses from the service
              endpoint. This is a schema.org property, and is redundant with encodingFormat
              in the result property for the Action.
            items:
              type: string
        required:
        - schema:urlTemplate
      result_type:
        type: object
        description: documentation of the serialization format for the API response,
          i.e. an implementation of the structure specified in the object type field
        properties:
          '@type':
            type: array
            description: Type of result object. Typically schema:DataDownload, but
              may include additional types.
            items:
              type: string
            contains:
              enum:
              - schema:DataDownload
            minItems: 1
          schema:encodingFormat:
            type: array
            items:
              type: string
          schema:description:
            type: string
      query-input_type:
        type: array
        description: object that maps the parameters (in braces {  } in the url template
          to specifications for the kind of value expected. parameters must all be
          strings in the URL
        minItems: 0
        items:
          type: object
          properties:
            '@id':
              type: string
            '@type':
              type: string
              default: schema:PropertyValueSpecification
              enum:
              - schema:PropertyValueSpecification
            schema:valueName:
              type: string
            schema:description:
              type: string
            schema:valueRequired:
              type: boolean
              default: true
            schema:valuePattern:
              type: string
          required:
          - schema:valueName
          - schema:description
      object_type:
        type: object
        description: description of the data structure of the return object
        properties:
          '@type':
            type: string
            default: schema:DataFeed
            enum:
            - schema:DataFeed
          schema:description:
            type: string
          schema:variableMeasured:
            type: array
            items:
              $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.action/$defs/VariableMeasured
      VariableMeasured:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.variableMeasured
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/action/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
type: object
title: 'Optional properties for CDIF discovery metadata schema, with schema: prefixes'
description: Building block specifies properties for CDIF schama.org discovery record
properties:
  schema:description:
    type: string
    description: A short summary describing a dataset. This text will be indexed by
      search applications, so the more information here, the better.
  schema:additionalType:
    description: identifiers for datatypes from other vocabularies (not schema.org)
      that apply to this metadata.
    type: array
    minItems: 0
    items:
      anyOf:
      - type: string
      - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/$defs/DefinedTerm
  schema:sameAs:
    description: The other identifiers for the dataset. Schema.org has three ways
      of encoding identifiers-- a text description, a URL, or by using the schema:PropertyValue
      field. The Science on Schema.org guidance strongly recommends using the PropertyValue
      approach. see https://github.com/ESIPFed/science-on-schema.org   .... Dataset.md#identifier.
    type: array
    minItems: 0
    items:
      anyOf:
      - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/$defs/Identifier
      - type: string
  schema:version:
    description: The version number or identifier for this dataset (text or numeric).
      The values should sort from oldest to newest using an alphanumeric sort on version
      strings
    anyOf:
    - type: string
    - type: number
  schema:inLanguage:
    type: string
    description: the language of the dataset content
  schema:datePublished:
    type: string
    description: ISO8601 formatted date (and optional time if relevant) when Dataset
      was made public.
  schema:relatedLink:
    type: array
    description: links to related resources; linkRelationship specifies how the resource
      is related.
    items:
      type: object
      properties:
        '@type':
          type: string
          enum:
          - schema:LinkRole
        schema:linkRelationship:
          anyOf:
          - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/$defs/DefinedTerm
          - type: string
        target:
          type: object
          properties:
            '@type':
              type: string
              enum:
              - schema:EntryPoint
            schema:encodingFormat:
              type: string
              description: registered MIME types are expected
            schema:name:
              type: string
            schema:url:
              type: string
              format: uri
  schema:publishingPrinciples:
    description: FDOF digitalObjectMutability, RDA digitalObjectPolicy, FDOF PersistencyPolicy.
      Policies related to maintenance, update, expected time to live. If an online
      resource documents the policies or a URI is used to identify the conditions,
      recommend using schema:CreativeWork to provide a label (name) and an identifier
      (URI or URL).
    type: array
    minItems: 0
    items:
      anyOf:
      - type: string
      - type: object
        properties:
          '@id':
            type: string
            description: a reference to a publishing principles statement
      - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/$defs/LabeledLink
  schema:keywords:
    description: Keywords are an array of strings, an array of schema:DefinedTerms,
      or some combination of these. If you have information about a controlled vocabulary
      from which keywords come from, use schema:DefinedTerm to descibe that keyword.
      This allowed variability makes parsing metadata hard; recommend using DefinedTerm
      for all keywords if any of them are from a known vocabulary, otherwise an array
      of strings.
    type: array
    items:
      anyOf:
      - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/$defs/DefinedTerm
      - type: string
  schema:creator:
    description: author or orginator of intellectual content of dataset. Uset the
      JSON-LD @list construct to preserve author order. Use contributor with the Role
      property to specify other roles related to creation or stewardship of the resource.
    type: object
    properties:
      '@list':
        type: array
        items:
          anyOf:
          - type: object
            properties:
              '@id':
                type: string
                description: a identifier for an agent defined in this metadata, or
                  externally; must be dereferenceable
          - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/$defs/Person
          - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/$defs/Organization
  schema:contributor:
    description: other parties who played a role in production of dataset
    type: array
    items:
      anyOf:
      - type: object
        properties:
          '@id':
            type: string
            description: a identifier for an agent defined in this metadata, or externally;
              must be dereferenceable
      - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/$defs/Person
      - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/$defs/Organization
      - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/$defs/Contributor
  schema:publisher:
    description: Party who made the dataset publicly available
    anyOf:
    - type: object
      properties:
        '@id':
          type: string
          description: a identifier for an agent defined in this metadata, or externally;
            must be dereferenceable
    - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/$defs/Person
    - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/$defs/Organization
  schema:provider:
    description: Party who maintains the distribution options for the dataset. If
      there are multiple distributions from different providers, use the provider
      property on distribution/DataDownload
    type: array
    items:
      anyOf:
      - type: object
        properties:
          '@id':
            type: string
            description: a identifier for an agent defined in this metadata, or externally;
              must be dereferenceable
      - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/$defs/Person
      - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/$defs/Organization
  schema:funding:
    type: array
    items:
      $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/$defs/Funder
  schema:variableMeasured:
    description: What does the dataset measure? (e.g., temperature, pressure)
    type: array
    items:
      $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/$defs/VariableMeasured
  schema:spatialCoverage:
    description: To specify location that is the subject of resource content; use
      schema.org place names, bounding box, point or optional OGC WKT gemetry.
    type: array
    items:
      $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/$defs/SpatialExtent
  schema:temporalCoverage:
    description: The time interval during which data was collected or observations
      were made; or a time period that an activity or collection is linked to intellectually
      or thematically (for example, 1997 to 1998; the 18th century) (see https://documentation.ardc.edu.au/display/DOC/Temporal+coverage).
      For documentation of Earth Science, Paleobiology or Paleontology datasets, we
      are interested in the second case-- the time period that data are linked to
      thematically.
    type: array
    items:
      $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/$defs/TemporalExtent
  prov:wasGeneratedBy:
    description: Brief information about instruments, software or experimental protocols
      used
    type: array
    items:
      $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/$defs/GeneratedBy
  prov:wasDerivedFrom:
    description: Brief information about sources of data used in aggregate datasets
    type: array
    items:
      $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/$defs/DerivedFrom
  dqv:hasQualityMeasurement:
    description: Brief information quality measurements reported to assess the resource
    type: array
    items:
      $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/$defs/QualityMeasure
  schema:distribution:
    description: Distribution options for the dataset.
    type: array
    items:
      anyOf:
      - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/$defs/DataDownload
      - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/$defs/WebAPI
$defs:
  LabeledLink:
    $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.labeledLink
  Identifier:
    $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifOptional/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
  DefinedTerm:
