  cdif.bbr.metadata.schemaorgProperties.instrument:
    title: Instrument Description
    description: Schema for describing laboratory instruments and instrument systems.
      Supports ownership, manufacturer, model, commissioning dates, hierarchical sub-components
      via schema:hasPart, and domain-specific typing. Instruments may be standalone
      devices or complex systems with sub-components.
    type: object
    properties:
      '@context':
        type: object
        description: JSON-LD context declaring namespace prefixes.
        properties:
          schema:
            enum:
            - http://schema.org/
          dcterms:
            enum:
            - http://purl.org/dc/terms/
        required:
        - schema
      '@id':
        type: string
        description: Persistent identifier URI for this instrument metadata record.
      '@type':
        type: array
        items:
          type: string
        minItems: 2
        description: Must include schema:Product and schema:Thing. May include additional
          types.
        allOf:
        - contains:
            enum:
            - schema:Product
        - contains:
            enum:
            - schema:Thing
      schema:additionalType:
        description: Domain-specific type classifications. Should include a scientific
          instrument type URI (e.g. wd:Q3099911 for Wikidata scientific instrument).
        type: array
        items:
          type: string
        minItems: 1
      schema:name:
        type: string
        minLength: 3
        description: Human-readable name for this instrument.
      schema:description:
        type: string
        description: Text description of this instrument, its purpose, and capabilities.
      schema:alternateName:
        description: Alternate name(s), e.g. specific make/model designation, common
          abbreviation.
        anyOf:
        - type: string
        - type: array
          items:
            type: string
      schema:identifier:
        description: Formal identifier(s) for this instrument. Use PropertyValue for
          structured identifiers (e.g. PIDINST, serial number, inventory number).
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifProvActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/Identifier
        - type: array
          items:
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifProvActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/Identifier
      schema:url:
        type: string
        format: uri
        description: Landing page URL for this instrument.
      schema:manufacturer:
        description: Organization that manufactured this instrument.
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifProvActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/Organization
      schema:model:
        type: object
        description: Product model information for this instrument.
        properties:
          '@type':
            anyOf:
            - type: string
              enum:
              - schema:ProductModel
            - type: array
              items:
                type: string
              contains:
                enum:
                - schema:ProductModel
          schema:name:
            type: string
            description: Model name or number.
          schema:identifier:
            description: Model identifier.
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifProvActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/Identifier
        required:
        - schema:name
      schema:category:
        description: Instrument type classification(s) from a controlled vocabulary.
        type: array
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifProvActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/DefinedTerm
      schema:owner:
        description: Organization that owns this instrument.
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifProvActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/Organization
      schema:contributor:
        description: Agents associated with this instrument in specific roles (e.g.
          operator, custodian, principal investigator). Use schema:owner for the owning
          organization.
        type: array
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifProvActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/AgentInRole
      schema:additionalProperty:
        type: array
        description: Instrument-specific properties (measured variables, detection
          limits, calibration information, operating parameters, etc.).
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifProvActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/AdditionalProperty
      schema:validFrom:
        type: string
        description: Date the instrument was commissioned (ISO 8601).
      schema:validThrough:
        type: string
        description: Date the instrument was decommissioned (ISO 8601). Absent if
          still operational.
      schema:hasPart:
        type: array
        description: Sub-components of this instrument system. Each item is either
          an inline instrument description or an @id reference.
        items:
          anyOf:
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifProvActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/InstrumentComponent
          - type: object
            properties:
              '@id':
                type: string
                description: Reference to a sub-component defined elsewhere.
            required:
            - '@id'
      schema:relatedLink:
        type: array
        description: Links to related resources (manuals, datasheets, calibration
          records, related instruments).
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifProvActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/LabeledLink
      schema:subjectOf:
        description: Catalog record metadata-about-metadata for this instrument description.
        type: object
        properties:
          '@id':
            type: string
          '@type':
            type: array
            items:
              type: string
          schema:dateModified:
            type: string
            description: Date this metadata record was last modified (ISO 8601).
          schema:about:
            type: object
            properties:
              '@id':
                type: string
                description: Reference back to the instrument @id.
          dcterms:conformsTo:
            description: Schema or profile this metadata record conforms to.
            type: array
            items:
              anyOf:
              - type: string
              - type: object
                properties:
                  '@id':
                    type: string
    required:
    - '@type'
    - schema:name
    - schema:identifier
    $defs:
      Identifier:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifProvActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
      Organization:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifProvActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.organization
      Person:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifProvActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.person
      DefinedTerm:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifProvActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.definedTerm
      AgentInRole:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifProvActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.agentInRole
      AdditionalProperty:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifProvActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.additionalProperty
      LabeledLink:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifProvActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.labeledLink
      InstrumentComponent:
        type: object
        description: A sub-component of an instrument system. Uses the same structure
          as the parent instrument but without nesting (single level of hasPart).
        properties:
          '@type':
            type: array
            items:
              type: string
            minItems: 1
            contains:
              enum:
              - schema:Thing
          '@id':
            type: string
          schema:name:
            type: string
            minLength: 3
          schema:description:
            type: string
          schema:alternateName:
            anyOf:
            - type: string
            - type: array
              items:
                type: string
          schema:identifier:
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifProvActivity/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/Identifier
          schema:additionalType:
            description: Component type classification.
