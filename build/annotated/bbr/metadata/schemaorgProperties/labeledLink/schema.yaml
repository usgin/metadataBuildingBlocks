$schema: https://json-schema.org/draft/2020-12/schema
description: schema for a labeled link, a profile of schema.org/CreativeWork
type: object
properties:
  '@type':
    default: schema:CreativeWork
    anyOf:
    - type: string
      const: schema:CreativeWork
    - type: array
      items:
        type: string
      contains:
        const: schema:CreativeWork
  schema:name:
    type: string
  schema:description:
    type: string
  schema:url:
    type: string
    format: uri
required:
- '@type'
- schema:url
x-jsonld-prefixes:
  schema: http://schema.org/
