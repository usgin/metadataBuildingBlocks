x-defs:
  cdif.bbr.metadata.schemaorgProperties.instrument:
    title: Instrument Description
    description: Schema for describing laboratory instruments and instrument systems.
      Supports ownership, manufacturer, model, commissioning dates, hierarchical sub-components
      via schema:hasPart, and domain-specific typing. Instruments may be standalone
      devices or complex systems with sub-components.
    type: object
    properties:
      '@context':
        type: object
        description: JSON-LD context declaring namespace prefixes.
        properties:
          schema:
            enum:
            - http://schema.org/
          dcterms:
            enum:
            - http://purl.org/dc/terms/
        required:
        - schema
      '@id':
        type: string
        description: Persistent identifier URI for this instrument metadata record.
      '@type':
        type: array
        items:
          type: string
        minItems: 2
        description: Must include schema:Product and schema:Thing. May include additional
          types.
        allOf:
        - contains:
            enum:
            - schema:Product
        - contains:
            enum:
            - schema:Thing
      schema:additionalType:
        description: Domain-specific type classifications. Should include a scientific
          instrument type URI (e.g. wd:Q3099911 for Wikidata scientific instrument).
        type: array
        items:
          type: string
        minItems: 1
      schema:name:
        type: string
        minLength: 3
        description: Human-readable name for this instrument.
      schema:description:
        type: string
        description: Text description of this instrument, its purpose, and capabilities.
      schema:alternateName:
        description: Alternate name(s), e.g. specific make/model designation, common
          abbreviation.
        anyOf:
        - type: string
        - type: array
          items:
            type: string
      schema:identifier:
        description: Formal identifier(s) for this instrument. Use PropertyValue for
          structured identifiers (e.g. PIDINST, serial number, inventory number).
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/Identifier
        - type: array
          items:
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/Identifier
      schema:url:
        type: string
        format: uri
        description: Landing page URL for this instrument.
      schema:manufacturer:
        description: Organization that manufactured this instrument.
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/Organization
      schema:model:
        type: object
        description: Product model information for this instrument.
        properties:
          '@type':
            anyOf:
            - type: string
              enum:
              - schema:ProductModel
            - type: array
              items:
                type: string
              contains:
                enum:
                - schema:ProductModel
          schema:name:
            type: string
            description: Model name or number.
          schema:identifier:
            description: Model identifier.
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/Identifier
        required:
        - schema:name
      schema:category:
        description: Instrument type classification(s) from a controlled vocabulary.
        type: array
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/DefinedTerm
      schema:owner:
        description: Organization that owns this instrument.
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/Organization
      schema:contributor:
        description: Agents associated with this instrument in specific roles (e.g.
          operator, custodian, principal investigator). Use schema:owner for the owning
          organization.
        type: array
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/AgentInRole
      schema:additionalProperty:
        type: array
        description: Instrument-specific properties (measured variables, detection
          limits, calibration information, operating parameters, etc.).
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/AdditionalProperty
      schema:validFrom:
        type: string
        description: Date the instrument was commissioned (ISO 8601).
      schema:validThrough:
        type: string
        description: Date the instrument was decommissioned (ISO 8601). Absent if
          still operational.
      schema:hasPart:
        type: array
        description: Sub-components of this instrument system. Each item is either
          an inline instrument description or an @id reference.
        items:
          anyOf:
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/InstrumentComponent
          - type: object
            properties:
              '@id':
                type: string
                description: Reference to a sub-component defined elsewhere.
            required:
            - '@id'
      schema:relatedLink:
        type: array
        description: Links to related resources (manuals, datasheets, calibration
          records, related instruments).
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/LabeledLink
      schema:subjectOf:
        description: Catalog record metadata-about-metadata for this instrument description.
        type: object
        properties:
          '@id':
            type: string
          '@type':
            type: array
            items:
              type: string
          schema:dateModified:
            type: string
            description: Date this metadata record was last modified (ISO 8601).
          schema:about:
            type: object
            properties:
              '@id':
                type: string
                description: Reference back to the instrument @id.
          dcterms:conformsTo:
            description: Schema or profile this metadata record conforms to.
            type: array
            items:
              anyOf:
              - type: string
              - type: object
                properties:
                  '@id':
                    type: string
    required:
    - '@type'
    - schema:name
    - schema:identifier
    $defs:
      Identifier:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
      Organization:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.organization
      Person:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.person
      DefinedTerm:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.definedTerm
      AgentInRole:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.agentInRole
      AdditionalProperty:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.additionalProperty
      LabeledLink:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.labeledLink
      InstrumentComponent:
        type: object
        description: A sub-component of an instrument system. Uses the same structure
          as the parent instrument but without nesting (single level of hasPart).
        properties:
          '@type':
            type: array
            items:
              type: string
            minItems: 1
            contains:
              enum:
              - schema:Thing
          '@id':
            type: string
          schema:name:
            type: string
            minLength: 3
          schema:description:
            type: string
          schema:alternateName:
            anyOf:
            - type: string
            - type: array
              items:
                type: string
          schema:identifier:
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/Identifier
          schema:additionalType:
            description: Component type classification.
            anyOf:
            - type: string
            - type: array
              items:
                type: string
          schema:additionalProperty:
            type: array
            items:
              $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/AdditionalProperty
          schema:manufacturer:
            $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/Organization
          schema:model:
            type: object
            properties:
              '@type':
                anyOf:
                - type: string
                  enum:
                  - schema:ProductModel
                - type: array
                  items:
                    type: string
                  contains:
                    enum:
                    - schema:ProductModel
              schema:name:
                type: string
              schema:identifier:
                anyOf:
                - type: string
                - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/Identifier
        required:
        - schema:name
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/instrument/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.schemaorgProperties.identifier:
    description: Properties for a schema.org identifier
    type: object
    properties:
      '@type':
        anyOf:
        - type: string
          enum:
          - schema:PropertyValue
        - type: array
          items:
            type: string
          contains:
            enum:
            - schema:PropertyValue
      schema:propertyID:
        type: string
        description: In this context for the schema:PropertyValue, this field is an
          identifier for the identifier schema, e.g. DOI, ARK.  Get values from https://registry.identifiers.org/registry/
          for interoperability
      schema:value:
        type: string
        description: the identifier string. E.g. 10.5066/F7VX0DMQ
      schema:url:
        type: string
        format: uri
        description: 'web-resolveable string for the identifier; host name part is
          location of a resolver that will return some representation for the given
          identifier value. E.g. https://doi.org/10.5066/F7VX0DMQ '
    allOf:
    - required:
      - '@type'
    - anyOf:
      - required:
        - schema:value
      - required:
        - schema:url
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/identifier/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.schemaorgProperties.organization:
    type: object
    properties:
      '@id':
        type: string
      '@type':
        default: schema:Organization
        anyOf:
        - type: string
          enum:
          - schema:Organization
        - type: array
          items:
            type: string
          contains:
            enum:
            - schema:Organization
      schema:additionalType:
        type: array
        items:
          anyOf:
          - type: string
            enum:
            - schema:FundingAgency
            - schema:Consortium
            - schema:Corporation
            - schema:EducationalOrganization
            - schema:FundingScheme
            - schema:GovernmentOrganization
            - schema:NGO
            - schema:Project
            - schema:ResearchOrganization
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.definedTerm
          - type: string
      schema:name:
        type: string
        description: string label for organization that is meaningful for human users
      schema:alternateName:
        type: string
        description: other labels by which the organization might be known
      schema:description:
        type: string
      schema:identifier:
        description: identifier for organization
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
        - type: string
      schema:sameAs:
        type: array
        description: other identifiers for the organization
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
    allOf:
    - required:
      - '@type'
    - anyOf:
      - required:
        - schema:name
      - required:
        - schema:identifier
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/organization/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.schemaorgProperties.person:
    description: schema for cdif profile of schema.org/Person
    type: object
    properties:
      '@id':
        type: string
      '@type':
        anyOf:
        - type: string
          enum:
          - schema:Person
        - type: array
          items:
            type: string
          contains:
            enum:
            - schema:Person
      schema:name:
        type: string
        description: string label for person that is meaningful for human users
      schema:description:
        type: string
      schema:identifier:
        description: identifier for person, recommend ORCID
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
        - type: string
      schema:alternateName:
        type: string
        description: other labels by which the person might be known
      schema:affiliation:
        description: if affiliation is present, value must be a schema:Organization.
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.organization
      schema:contactPoint:
        type: object
        properties:
          '@type':
            default: schema:ContactPoint
            anyOf:
            - type: string
              enum:
              - schema:ContactPoint
            - type: array
              items:
                type: string
              contains:
                enum:
                - schema:ContactPoint
          schema:email:
            type: string
        description: restrict to email only. Schema.org allows telephone and postal
          contacts as well
      schema:sameAs:
        type: array
        description: other identifiers for the person
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
    allOf:
    - required:
      - '@type'
    - anyOf:
      - required:
        - schema:name
      - required:
        - schema:identifier
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/person/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.schemaorgProperties.definedTerm:
    description: schema.org Defined Term schema
    type: object
    properties:
      '@type':
        anyOf:
        - type: string
          enum:
          - schema:DefinedTerm
        - type: array
          items:
            type: string
          contains:
            enum:
            - schema:DefinedTerm
      schema:name:
        type: string
        description: text label for the term that is useful to human user
      schema:identifier:
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
      schema:inDefinedTermSet:
        type: string
        description: Identifier for the controlled vocabulary responsible for this
          keyword.
      schema:termCode:
        type: string
        description: A representative code for this keyword in the controlled vocabulary
          (Optional).  Analogous to skos:Notation
    allOf:
    - required:
      - '@type'
    - anyOf:
      - required:
        - schema:name
      - required:
        - schema:identifier
      - required:
        - schema:termCode
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/definedTerm/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.schemaorgProperties.agentInRole:
    description: For more granularity on how a person contributed to a Dataset, use
      schema:Role. The schema.org documentation does not state that the Role type
      is an expected data type of author, creator and contributor, but that is addressed
      in this blog post (http://blog.schema.org/2014/06/introducing-role.html). see
      https://github.com/ESIPFed/science-on-schema.org/blob/develop/guides/Dataset.md#roles-of-people
    type: object
    properties:
      '@type':
        default: schema:Role
        anyOf:
        - type: string
          enum:
          - schema:Role
        - type: array
          items:
            type: string
          contains:
            enum:
            - schema:Role
      schema:roleName:
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.definedTerm
      schema:contributor:
        anyOf:
        - type: object
          properties:
            '@id':
              type: string
              description: IRI reference to a Person or Organization defined elsewhere
          required:
          - '@id'
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.person
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.organization
    required:
    - schema:roleName
    - schema:contributor
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/agentInRole/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.schemaorgProperties.additionalProperty:
    type: object
    title: additionalProperty PropertyValue
    description: 'PropertyValue values required to define a soft-typed property with
      a value. '
    properties:
      '@type':
        anyOf:
        - type: string
          enum:
          - schema:PropertyValue
        - type: array
          items:
            type: string
          contains:
            enum:
            - schema:PropertyValue
      schema:propertyID:
        type: array
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.additionalProperty/$defs/propertyID_item
        minItems: 1
        description: identifier or name for the property concept quantified by the
          values in this variable slot. Multiple values can specify the property at
          different levels of granularity.
      schema:name:
        type: string
      schema:value:
        anyOf:
        - type: string
        - type: number
        - type: boolean
        - type: object
      schema:unitCode:
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.additionalProperty/$defs/DefinedTerm
      schema:unitText:
        type: string
    required:
    - schema:name
    - schema:value
    $defs:
      DefinedTerm:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.definedTerm
      propertyID_item:
        anyOf:
        - type: string
        - type: object
          properties:
            '@id':
              type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.additionalProperty/$defs/DefinedTerm
    x-jsonld-prefixes:
      schema: http://schema.org/
      nxs: http://purl.org/nexusformat/definitions/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/additionalProperty/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.schemaorgProperties.labeledLink:
    description: schema for a labeled link, a profile of schema.org/CreativeWork
    type: object
    properties:
      '@type':
        default: schema:CreativeWork
        anyOf:
        - type: string
          enum:
          - schema:CreativeWork
        - type: array
          items:
            type: string
          contains:
            enum:
            - schema:CreativeWork
      schema:name:
        type: string
      schema:description:
        type: string
      schema:url:
        type: string
        format: uri
    required:
    - '@type'
    - schema:url
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/labeledLink/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
title: XAS Instrument
description: XAS-specific instrument building block. Extends the generic instrument
  building block with required wd:Q3099911 (Wikidata scientific instrument) additionalType
  classification.
allOf:
- $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument
- type: object
  properties:
    schema:additionalType:
      type: array
      items:
        type: string
      minItems: 1
      uniqueItems: true
      allOf:
