          properties:
            schema:name:
              type: string
            schema:inDefinedTermSet:
              enum:
              - nxs:Field/NXxas/ENTRY/DATA/mode
          required:
          - schema:name
          - schema:inDefinedTermSet
    schema:keywords:
      type: array
      description: extends base CDIF keyword schema to require defined terms for the
        absorption edge and the target element for the analysis
      minItems: 2
      items:
        type: object
        properties:
          '@type':
            anyOf:
            - type: string
              enum:
              - schema:DefinedTerm
            - type: array
              items:
                type: string
              contains:
                enum:
                - schema:DefinedTerm
          schema:name:
            type: string
          schema:identifier:
            type: string
          schema:inDefinedTermSet:
            type: string
            description: need to include this to tag what the keyword is about; we're
              using the keywords as soft-typed properties
        required:
        - '@type'
        - schema:name
        - schema:inDefinedTermSet
        additionalProperties: true
      contains:
        type: object
        properties:
          schema:inDefinedTermSet:
            enum:
            - https://github.com/XraySpectroscopy/XAS-Data-Interchange/blob/master/specification/dictionary.md
        required:
        - schema:inDefinedTermSet
      allOf:
      - contains:
          type: object
          properties:
            schema:inDefinedTermSet:
              enum:
              - http://sweetontology.net/matrElement
          required:
          - schema:inDefinedTermSet
