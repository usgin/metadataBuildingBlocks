x-defs:
  cdif.bbr.metadata.cdifProperties.cdifMandatory:
    type: object
    title: 'Optional properties for CDIF Discovery metadata schema, with schema: prefixes'
    description: Building block specifies properties for minimal CDIF schama.org discovery
      record
    properties:
      '@context':
        type: object
        description: JSON-LD context declaring namespace prefixes used in the metadata
          record.
        properties:
          schema:
            enum:
            - http://schema.org/
          dcterms:
            enum:
            - http://purl.org/dc/terms/
          spdx:
            enum:
            - http://spdx.org/rdf/terms#
          dcat:
            enum:
            - http://www.w3.org/ns/dcat#
        required:
        - schema
        - dcterms
      '@id':
        type: string
        description: 'The URI for the resource should be the @id value for the root
          of the JSON instance document tree. Must be an IRI (e.g. https://doi.org/...,
          urn:..., or a relative URI like #localid). Note that this identifier can
          be interpreted to identify the resource that is the subject of this metadata
          record, or the JSON-LD object that is the digital object containing the
          metadata information.'
      '@type':
        description: a schema.org Class that specifies the expected information content
          for the metadata record. The array must include at least one schema.org
          type value. Default is schema:Dataset.
        type: array
        items:
          type: string
          enum:
          - schema:CreativeWork
          - schema:SoftwareApplication
          - schema:SoftwareSourceCode
          - schema:Product
          - schema:WebAPI
          - schema:Dataset
          - schema:DigitalDocument
          - schema:Collection
          - schema:ImageObject
          - schema:DataCatalog
          - schema:DefinedTermSet
          - schema:MediaObject
        default: schema:Dataset
        minItems: 1
        contains:
          enum:
          - schema:Dataset
      schema:name:
        type: string
        description: A descriptive name of a dataset (e.g., 'Snow depth in Northern
          Hemisphere'). The name should uniquely identify the described resource for
          human use, in the scope of the metadata catalog containing this metadata
          record.
      schema:identifier:
        description: The primary identifier for the dataset; other identifiers should
          be listed in the sameAs field. Schema.org has three ways of encoding identifiers--
          a text description, a URL, or by using the schema:PropertyValue field. The
          Science on Schema.org guidance strongly recommends using the PropertyValue
          approach. see https://github.com/ESIPFed/science-on-schema.org   .... Dataset.md#identifier.  Ideally,
          for any given data provided they would provide identifiers either all as
          strings or all as identifier_type.
        anyOf:
        - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifMandatory/$defs/Identifier
        - type: string
      schema:dateModified:
        type: string
        description: ISO8601 formatted date (and optional time if relevant) when Dataset
          was last updated
      schema:conditionsOfAccess:
        description: 'text statement of conditions for use and access; if an online
          resource documents the restrictions or a URI is used to identify the conditions,
          recommend using schema:CreativeWork to provide a label (name) and an identifier
          (URI or URL). '
        type: array
        minItems: 0
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: a reference to a resource defining conditions of Access
          - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifMandatory/$defs/LabeledLink
      schema:license:
        description: 'legal statement of conditions for use and access; recommend
          using schema:CreativeWork to provide a label (name) for the license, and
          an identifier. Sources of license identifiers: https://opensource.org/licenses/,
          https://creativecommons.org/about/cclicenses/, https://spdx.org/licenses/,
          http://cor.esipfed.org/ont/earthcube/swl. If only a string is provided,
          it should be an identifier for the license, ideally a resolvable URI'
        type: array
        minItems: 0
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: a reference to a license defintion
          - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifMandatory/$defs/LabeledLink
      schema:url:
        type: string
        format: uri
        description: Web Location of a page describing the dataset (landing page),
          typically providing links or instructions to get the actual resource content;
          analogous to dcat:accessURL. If a direct link is available to get the data,
          put in distribution/contentUrl
      schema:distribution:
        description: specifies how to download the data in a specific format or access
          via a web API. This property describes where to get the data and in what
          format by using the schema:DataDownload type. If user must access data through
          a landing page, provide link to landing page in the 'url' property for the
          dataset
        type: array
        items:
          anyOf:
          - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifMandatory/$defs/DataDownload
          - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifMandatory/$defs/WebAPI
      schema:subjectOf:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifMandatory/$defs/CdifCatalogRecord
    allOf:
    - required:
      - '@id'
      - '@type'
      - '@context'
      - schema:name
      - schema:identifier
      - schema:dateModified
      - schema:subjectOf
    - anyOf:
      - required:
        - schema:license
      - required:
        - schema:conditionsOfAccess
    - anyOf:
      - required:
        - schema:url
      - required:
        - schema:distribution
    $defs:
      LabeledLink:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.labeledLink
      Identifier:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
      DefinedTerm:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.definedTerm
      DataDownload:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.dataDownload
      WebAPI:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.webAPI
      CdifCatalogRecord:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCatalogRecord
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifMandatory/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.cdifProperties.cdifProvActivity:
    title: CDIF Provenance Activity
    description: Extended provenance activity building block for CDIF. Extends the
      minimal prov:Activity (generatedBy) with schema.org Action properties for comprehensive
      provenance documentation including agents, instruments, methodology, temporal
      bounds, action chaining, and more.
    type: object
    allOf:
    - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.provProperties.generatedBy
    - type: object
      properties:
        '@type':
          type: array
          items:
            type: string
          minItems: 2
          contains:
            enum:
            - schema:Action
          description: Must include both schema:Action and prov:Activity (prov:Activity
            required by base generatedBy schema)
        prov:used:
          type: array
          items:
            anyOf:
            - type: string
            - type: object
              properties:
                '@id':
                  type: string
                  description: a resolvable reference to a representation of the software
                    or instrument used
            - type: object
              description: an item used by the activity that includes a schema:instrument
                sub-key
              properties:
                schema:instrument:
                  $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/Instrument
              required:
              - schema:instrument
        schema:name:
          type: string
          description: Human-readable name for the activity
        schema:description:
          type: string
          description: Text description of what this activity did
        schema:identifier:
          description: Formal identifier for this activity
          anyOf:
          - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/Identifier
          - type: string
        schema:agent:
          description: Primary responsible agent for this activity (maps to PROV wasAssociatedWith)
          anyOf:
          - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/Person
          - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/Organization
          - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/AgentInRole
          - type: object
            properties:
              '@id':
                type: string
                description: reference to an agent defined elsewhere
            required:
            - '@id'
        schema:participant:
          description: Other participants in this activity
          type: array
          items:
            anyOf:
            - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/Person
            - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/Organization
            - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/AgentInRole
            - type: object
              properties:
                '@id':
                  type: string
                  description: reference to a participant defined elsewhere
              required:
              - '@id'
        schema:object:
          description: Input entity for this activity (for action chaining, references
            the result of a prior activity)
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: reference to an input entity
        schema:result:
          description: Output entity produced by this activity (for action chaining,
            can be referenced as object of a subsequent activity)
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: reference to an output entity
        schema:actionStatus:
          type: string
          description: Status of this activity
          enum:
          - schema:CompletedActionStatus
          - schema:ActiveActionStatus
          - schema:PotentialActionStatus
          - schema:FailedActionStatus
        schema:startTime:
          type: string
          description: ISO8601 date-time when the activity started (maps to PROV startedAtTime)
        schema:endTime:
          type: string
          description: ISO8601 date-time when the activity ended (maps to PROV endedAtTime)
        schema:location:
          description: Where the activity occurred
          anyOf:
          - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/SpatialExtent
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: reference to a place defined elsewhere
        schema:actionProcess:
          description: Methodology or protocol for this activity
          anyOf:
          - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/HowTo
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: reference to a methodology defined elsewhere
        schema:error:
          type: string
          description: Error description for failed activities
        schema:additionalProperty:
          description: Domain-specific extension properties
          type: array
          items:
            $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/AdditionalProperty
    $defs:
      Person:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.person
      Organization:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.organization
      AgentInRole:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.agentInRole
      Identifier:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
      Instrument:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument
      DefinedTerm:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.definedTerm
      LabeledLink:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.labeledLink
      SpatialExtent:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.spatialExtent
      AdditionalProperty:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.additionalProperty
      HowTo:
        type: object
        description: A methodology or protocol described as a HowTo with optional
          steps
        properties:
          '@type':
            anyOf:
            - type: string
              enum:
              - schema:HowTo
            - type: array
              items:
                type: string
              contains:
                enum:
                - schema:HowTo
          '@id':
            type: string
          schema:name:
            type: string
            description: Name of the methodology or protocol
          schema:description:
            type: string
            description: Description of the methodology
          schema:url:
            type: string
            format: uri
            description: URL to a published methodology or protocol document
          schema:step:
            type: array
            description: Ordered steps in this methodology
            items:
              $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/HowToStep
        required:
        - '@type'
        anyOf:
        - required:
          - schema:name
        - required:
          - schema:url
      HowToStep:
        type: object
        description: A single step in a HowTo methodology
        properties:
          '@type':
            anyOf:
            - type: string
              enum:
              - schema:HowToStep
            - type: array
              items:
                type: string
              contains:
                enum:
                - schema:HowToStep
          schema:name:
            type: string
            description: Name of this step
          schema:description:
            type: string
            description: Description of what this step involves
          schema:url:
            type: string
            format: uri
            description: URL to documentation for this step
          schema:position:
            type: integer
            description: Ordinal position of this step
        required:
        - '@type'
        - schema:name
      Claim:
        type: object
        description: A statement or assertion about the dataset, such as a quality
          claim
        properties:
          '@type':
            anyOf:
            - type: string
              enum:
              - schema:Claim
            - type: array
              items:
                type: string
              contains:
                enum:
                - schema:Claim
          '@id':
            type: string
          schema:claimReviewed:
            type: string
            description: The claim being reviewed or asserted
          schema:author:
            description: Author of this claim
            anyOf:
            - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/Person
            - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/Organization
            - type: object
              properties:
                '@id':
                  type: string
          schema:datePublished:
            type: string
            description: ISO8601 date when this claim was published
          schema:appearance:
            description: Where this claim appears
            anyOf:
            - type: string
            - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/LabeledLink
        required:
        - '@type'
        - schema:claimReviewed
    x-jsonld-prefixes:
      schema: http://schema.org/
      prov: http://www.w3.org/ns/prov#
    x-schema-source: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifProvActivity/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.schemaorgProperties.definedTerm:
    description: schema.org Defined Term schema
    type: object
    properties:
      '@type':
        anyOf:
        - type: string
          enum:
          - schema:DefinedTerm
        - type: array
          items:
            type: string
          contains:
            enum:
            - schema:DefinedTerm
      schema:name:
        type: string
        description: text label for the term that is useful to human user
      schema:identifier:
        anyOf:
        - type: string
        - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
      schema:inDefinedTermSet:
        type: string
        description: Identifier for the controlled vocabulary responsible for this
          keyword.
      schema:termCode:
        type: string
        description: A representative code for this keyword in the controlled vocabulary
          (Optional).  Analogous to skos:Notation
    allOf:
    - required:
      - '@type'
    - anyOf:
      - required:
        - schema:name
      - required:
        - schema:identifier
      - required:
        - schema:termCode
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/definedTerm/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.schemaorgProperties.additionalProperty:
    type: object
    title: additionalProperty PropertyValue
    description: 'PropertyValue values required to define a soft-typed property with
      a value. '
    properties:
      '@type':
        anyOf:
        - type: string
          enum:
          - schema:PropertyValue
        - type: array
          items:
            type: string
          contains:
            enum:
            - schema:PropertyValue
      schema:propertyID:
        type: array
        items:
          $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.additionalProperty/$defs/propertyID_item
        minItems: 1
        description: identifier or name for the property concept quantified by the
          values in this variable slot. Multiple values can specify the property at
          different levels of granularity.
      schema:name:
        type: string
      schema:value:
        anyOf:
        - type: string
        - type: number
        - type: boolean
        - type: object
      schema:unitCode:
        anyOf:
        - type: string
        - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.additionalProperty/$defs/DefinedTerm
      schema:unitText:
        type: string
    required:
    - schema:name
    - schema:value
    $defs:
      DefinedTerm:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.definedTerm
      propertyID_item:
        anyOf:
        - type: string
        - type: object
          properties:
            '@id':
              type: string
        - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasRequired/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.additionalProperty/$defs/DefinedTerm
    x-jsonld-prefixes:
      schema: http://schema.org/
      nxs: http://purl.org/nexusformat/definitions/
    x-schema-source: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/additionalProperty/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.schemaorgProperties.dataDownload:
    description: schema to document file-based access to a resoruce via URL, based
      on schema.org/DataDownload
    type: object
    properties:
      '@id':
        type: string
      '@type':
        type: array
        description: implement as array because extensions might need to add additional
          types
        items:
          type: string
        contains:
          enum:
          - schema:DataDownload
        minItems: 1
      schema:name:
        type: string
      schema:description:
        type: string
        description: Description of this distribution, e.g. what format, access constraints,
          etc.
      schema:contentUrl:
        type: string
        format: uri
      schema:encodingFormat:
        type: array
        description: MIME type with extension; should indicate the serialization scheme
          in sufficient detail that machine can know how to parse.
        items:
          type: string
      spdx:checksum:
        type: object
        description: A string value calculated from the content of the resource representation,
          used to test if content has been modified. The checksum is a property of
          a particular distribution/DataDownload.
        properties:
          '@type':
            anyOf:
            - type: string
              enum:
              - spdx:Checksum
            - type: array
              items:
                type: string
              contains:
                enum:
                - spdx:Checksum
          spdx:algorithm:
            type: string
          spdx:checksumValue:
            type: string
        required:
        - '@type'
      dcterms:conformsTo:
        description: An identifier for a standard or specification that the distribution
          conforms to. Recommended to enable machine-actionable data access.
        type: array
        minItems: 1
        items:
          type: object
          properties:
            '@id':
              type: string
              description: uri for specification that this distribution conforms to
      schema:provider:
        type: array
        description: Party who maintains this particular distribution option for the
          dataset. Use this property if there are multiple distributions from different
          providers
        items:
          anyOf:
          - type: object
            properties:
