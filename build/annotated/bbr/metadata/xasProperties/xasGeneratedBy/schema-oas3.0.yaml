x-defs:
  cdif.bbr.metadata.cdifProperties.cdifProv:
    title: CDIF Provenance Activity
    description: Extended provenance activity building block for CDIF. Extends the
      minimal prov:Activity (generatedBy) with schema.org Action properties for comprehensive
      provenance documentation including agents, instruments, methodology, temporal
      bounds, action chaining, and more.
    type: object
    allOf:
    - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.provProperties.generatedBy
    - type: object
      properties:
        '@type':
          type: array
          items:
            type: string
          minItems: 2
          contains:
            enum:
            - schema:Action
          description: Must include both schema:Action and prov:Activity (prov:Activity
            required by base generatedBy schema)
        prov:used:
          type: array
          items:
            anyOf:
            - type: string
            - type: object
              properties:
                '@id':
                  type: string
                  description: a resolvable reference to a representation of the software
                    or instrument used
            - type: object
              description: an item used by the activity that includes a schema:instrument
                sub-key
              properties:
                schema:instrument:
                  $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProv/$defs/Instrument
              required:
              - schema:instrument
        schema:name:
          type: string
          description: Human-readable name for the activity
        schema:description:
          type: string
          description: Text description of what this activity did
        schema:identifier:
          description: Formal identifier for this activity
          anyOf:
          - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProv/$defs/Identifier
          - type: string
        schema:agent:
          description: Primary responsible agent for this activity (maps to PROV wasAssociatedWith)
          anyOf:
          - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProv/$defs/Person
          - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProv/$defs/Organization
          - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProv/$defs/AgentInRole
          - type: object
            properties:
              '@id':
                type: string
                description: reference to an agent defined elsewhere
            required:
            - '@id'
        schema:participant:
          description: Other participants in this activity
          type: array
          items:
            anyOf:
            - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProv/$defs/Person
            - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProv/$defs/Organization
            - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProv/$defs/AgentInRole
            - type: object
              properties:
                '@id':
                  type: string
                  description: reference to a participant defined elsewhere
              required:
              - '@id'
        schema:object:
          description: Input entity for this activity (for action chaining, references
            the result of a prior activity)
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: reference to an input entity
        schema:result:
          description: Output entity produced by this activity (for action chaining,
            can be referenced as object of a subsequent activity)
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: reference to an output entity
        schema:actionStatus:
          type: string
          description: Status of this activity
          enum:
          - schema:CompletedActionStatus
          - schema:ActiveActionStatus
          - schema:PotentialActionStatus
          - schema:FailedActionStatus
        schema:startTime:
          type: string
          description: ISO8601 date-time when the activity started (maps to PROV startedAtTime)
        schema:endTime:
          type: string
          description: ISO8601 date-time when the activity ended (maps to PROV endedAtTime)
        schema:location:
          description: Where the activity occurred
          anyOf:
          - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProv/$defs/SpatialExtent
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: reference to a place defined elsewhere
        schema:actionProcess:
          description: Methodology or protocol for this activity
          anyOf:
          - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProv/$defs/HowTo
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: reference to a methodology defined elsewhere
        schema:error:
          type: string
          description: Error description for failed activities
        schema:additionalProperty:
          description: Domain-specific extension properties
          type: array
          items:
            $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProv/$defs/AdditionalProperty
    $defs:
      Person:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.person
      Organization:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.organization
      AgentInRole:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.agentInRole
      Identifier:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
      Instrument:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument
      DefinedTerm:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.definedTerm
      LabeledLink:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.labeledLink
      SpatialExtent:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.spatialExtent
      AdditionalProperty:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.additionalProperty
      HowTo:
        type: object
        description: A methodology or protocol described as a HowTo with optional
          steps
        properties:
          '@type':
            anyOf:
            - type: string
              enum:
              - schema:HowTo
            - type: array
              items:
                type: string
              contains:
                enum:
                - schema:HowTo
          '@id':
            type: string
          schema:name:
            type: string
            description: Name of the methodology or protocol
          schema:description:
            type: string
            description: Description of the methodology
          schema:url:
            type: string
            format: uri
            description: URL to a published methodology or protocol document
          schema:step:
            type: array
            description: Ordered steps in this methodology
            items:
              $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProv/$defs/HowToStep
        required:
        - '@type'
        anyOf:
        - required:
          - schema:name
        - required:
          - schema:url
      HowToStep:
        type: object
        description: A single step in a HowTo methodology
        properties:
          '@type':
            anyOf:
            - type: string
              enum:
              - schema:HowToStep
            - type: array
              items:
                type: string
              contains:
                enum:
                - schema:HowToStep
          schema:name:
            type: string
            description: Name of this step
          schema:description:
            type: string
            description: Description of what this step involves
          schema:url:
            type: string
            format: uri
            description: URL to documentation for this step
          schema:position:
            type: integer
            description: Ordinal position of this step
        required:
        - '@type'
        - schema:name
      Claim:
        type: object
        description: A statement or assertion about the dataset, such as a quality
          claim
        properties:
          '@type':
            anyOf:
            - type: string
              enum:
              - schema:Claim
            - type: array
              items:
                type: string
              contains:
                enum:
                - schema:Claim
          '@id':
            type: string
          schema:claimReviewed:
            type: string
            description: The claim being reviewed or asserted
          schema:author:
            description: Author of this claim
            anyOf:
            - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProv/$defs/Person
            - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProv/$defs/Organization
            - type: object
              properties:
                '@id':
                  type: string
          schema:datePublished:
            type: string
            description: ISO8601 date when this claim was published
          schema:appearance:
            description: Where this claim appears
            anyOf:
            - type: string
            - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProv/$defs/LabeledLink
        required:
        - '@type'
        - schema:claimReviewed
    x-jsonld-prefixes:
      schema: http://schema.org/
      prov: http://www.w3.org/ns/prov#
    x-schema-source: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifProv/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.schemaorgProperties.additionalProperty:
    type: object
    title: additionalProperty PropertyValue
    description: 'PropertyValue values required to define a soft-typed property with
      a value. '
    properties:
      '@type':
        anyOf:
        - type: string
          enum:
          - schema:PropertyValue
        - type: array
          items:
            type: string
          contains:
            enum:
            - schema:PropertyValue
      schema:propertyID:
        type: array
        items:
          $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.additionalProperty/$defs/propertyID_item
        minItems: 1
        description: identifier or name for the property concept quantified by the
          values in this variable slot. Multiple values can specify the property at
          different levels of granularity.
      schema:name:
        type: string
      schema:value:
        anyOf:
        - type: string
        - type: number
        - type: boolean
        - type: object
      schema:unitCode:
        anyOf:
        - type: string
        - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.additionalProperty/$defs/DefinedTerm
      schema:unitText:
        type: string
    required:
    - schema:name
    - schema:value
    $defs:
      DefinedTerm:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.definedTerm
      propertyID_item:
        anyOf:
        - type: string
        - type: object
          properties:
            '@id':
              type: string
        - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.additionalProperty/$defs/DefinedTerm
    x-jsonld-prefixes:
      schema: http://schema.org/
      nxs: http://purl.org/nexusformat/definitions/
    x-schema-source: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/additionalProperty/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.schemaorgProperties.identifier:
    description: Properties for a schema.org identifier
    type: object
    properties:
      '@type':
        anyOf:
        - type: string
          enum:
          - schema:PropertyValue
        - type: array
          items:
            type: string
          contains:
            enum:
            - schema:PropertyValue
      schema:propertyID:
        type: string
        description: In this context for the schema:PropertyValue, this field is an
          identifier for the identifier schema, e.g. DOI, ARK.  Get values from https://registry.identifiers.org/registry/
          for interoperability
      schema:value:
        type: string
        description: the identifier string. E.g. 10.5066/F7VX0DMQ
      schema:url:
        type: string
        format: uri
        description: 'web-resolveable string for the identifier; host name part is
          location of a resolver that will return some representation for the given
          identifier value. E.g. https://doi.org/10.5066/F7VX0DMQ '
    allOf:
    - required:
      - '@type'
    - anyOf:
      - required:
        - schema:value
      - required:
        - schema:url
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/identifier/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.xasProperties.xasSample:
    title: definitions for roles used in XAS profile
    type: object
    properties:
      '@type':
        type: array
        items:
          type: string
        minItems: 2
        uniqueItems: true
        allOf:
        - contains:
            enum:
            - schema:Product
          minContains: 1
        - contains:
            enum:
            - schema:Thing
          minContains: 1
      schema:additionalType:
        type: array
        items:
          type: string
        minItems: 2
        uniqueItems: true
        allOf:
        - contains:
            enum:
            - MaterialSample
          minContains: 1
        - contains:
            enum:
            - https://w3id.org/isample/vocabulary/materialsampleobjecttype/materialsample
          minContains: 1
      schema:name:
        type: string
      schema:identifier:
        anyOf:
        - type: string
        - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.xasProperties.xasSample/$defs/Identifier
      schema:description:
        type: string
      schema:additionalProperty:
        type: array
        description: extend base definition (AdditionalProperty) with some expected
          propertyID values from NEXUS and XDI specs added in the enum
        items:
          allOf:
          - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.xasProperties.xasSample/$defs/AdditionalProperty
          - properties:
              schema:propertyID:
                type: array
                minItems: 1
                items:
                  anyOf:
                  - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.additionalProperty/$defs/propertyID_item
                  - enum:
                    - xas:stoichiometry
                    - xas:samplePreparation
                    - nxs:Field/NXsample/mass
                    - nxs:Field/NXsample/point_group
                    - nxs:Field/NXsample/unit_cell
                    - xas:parentSample
                    - xas:materialState
    required:
    - '@type'
    - schema:additionalType
    - schema:name
    $defs:
      Identifier:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
      AdditionalProperty:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.additionalProperty
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasSample/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.xasProperties.xasFacility:
    title: definitions a Facility location, type schema:Place
    type: object
    properties:
      '@id':
        type: string
      '@type':
        anyOf:
        - type: string
          enum:
          - schema:Place
        - type: array
          items:
            type: string
          contains:
            enum:
            - schema:Place
      schema:additionalType:
        type: array
        items:
          type: string
        contains:
          enum:
          - xas:Facility
        minItems: 1
      schema:identifier:
        anyOf:
        - type: string
        - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.xasProperties.xasFacility/$defs/Identifier
      schema:name:
        type: string
      schema:additionalProperty:
        type: array
        items:
          $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.xasProperties.xasFacility/$defs/AdditionalProperty
    required:
    - '@type'
    - schema:additionalType
    - schema:name
    $defs:
      AdditionalProperty:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.additionalProperty
      Identifier:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
    x-jsonld-extra-terms:
      schema: http://schema.org
    x-jsonld-prefixes:
      xas: https://xas.org/dictionary/
    x-schema-source: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasFacility/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.xasProperties.xasInstrument:
    title: definitions for roles used in XAS profile
    type: object
    properties:
      '@type':
        type: array
        items:
          type: string
        minItems: 2
        uniqueItems: true
        description: Product and Thing are dummy place holders to get schema.org properties
          to validate
        allOf:
        - contains:
            enum:
            - schema:Product
          minContains: 1
        - contains:
            enum:
            - schema:Thing
          minContains: 1
      schema:additionalType:
        type: array
        items:
          type: string
        minItems: 1
        uniqueItems: true
        allOf:
        - contains:
            enum:
            - wd:Q3099911
          description: '3099911 is ''scientific instrument'', use this a flag for
            instruments. Have to declare prefix wd: https://www.wikidata.org/entity/'
          minContains: 1
      schema:name:
        type: string
      schema:identifier:
        anyOf:
        - type: string
        - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.xasProperties.xasInstrument/$defs/Identifier
      schema:description:
        type: string
      schema:additionalProperty:
        type: array
        description: AdditionalProperty propertyID will depend on the kind of instrument;
          validation in that detail is a future project
        items:
          $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.xasProperties.xasInstrument/$defs/AdditionalProperty
      schema:hasPart:
        type: array
        description: Sub-components of the instrument system
        items:
          anyOf:
          - $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.xasProperties.xasInstrument/$defs/Instrument
          - type: object
            properties:
              '@id':
                type: string
    required:
    - '@type'
    - schema:additionalType
    - schema:name
    $defs:
      Identifier:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
      AdditionalProperty:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.additionalProperty
      Instrument:
        $ref: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasGeneratedBy/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/xasProperties/xasInstrument/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.provProperties.generatedBy:
    title: very simple links or names of software or instruments used to generate
      a resource.
    type: object
    properties:
      '@type':
        type: array
        items:
          type: string
        minItems: 1
        contains:
          enum:
          - prov:Activity
      prov:used:
        type: array
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: a resolvable reference to a representation of the software
                  or instrument used
    x-jsonld-prefixes:
      schema: http://schema.org/
      prov: http://www.w3.org/ns/prov#
    x-schema-source: https://usgin.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/provProperties/generatedBy/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.schemaorgProperties.person:
    description: schema for cdif profile of schema.org/Person
    type: object
    properties:
      '@id':
        type: string
      '@type':
        anyOf:
        - type: string
          enum:
          - schema:Person
        - type: array
          items:
            type: string
          contains:
            enum:
            - schema:Person
      schema:name:
        type: string
        description: string label for person that is meaningful for human users
      schema:description:
        type: string
      schema:identifier:
