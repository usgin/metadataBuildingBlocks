---
$schema: https://json-schema.org/draft/2020-12/schema
title: CDIF Data Description properties
description: Additional constraints for CDIF data description level. Adds
  cdi:physicalDataType requirement on variableMeasured items and distribution-level
  cdi properties for file characterization (characterSet, fileSize, fileSizeUofM).
type: object
properties:
  'schema:subjectOf':
    properties:
      'dcterms:conformsTo':
        type: array
        items:
          type: object
          properties:
            '@id':
              type: string
              description: uri for specifications that this metadata record conforms to
        minItems: 1
        contains:
          type: object
          properties:
            '@id':
              const: 'https://w3id.org/cdif/dataDescription/1.0/'
  '@context':
    type: object
    description: Additional namespace prefix for data description properties.
    properties:
      csvw:
        const: "http://www.w3.org/ns/csvw#"
  'schema:variableMeasured':
    type: array
    items:
      allOf:
      - type: object
        description: All variableMeasured items at data description level must have
          an @id and cdi:physicalDataType so physical mappings can reference them.
        properties:
          '@id':
            type: string
            description: URI identifier for this variable, used as the target of
              cdi:formats_InstanceVariable references in physical mappings.
        required:
        - '@id'
      - $ref: '#/$defs/cdifVariableMeasured'
  'schema:distribution':
    type: array
    items:
      allOf:
        - type: object
          properties:
            'cdi:characterSet':
              type: string
              description: The character set used in the distribution (e.g., UTF-8, ASCII).
            'cdi:fileSize':
              type: number
              description: The size of the distribution file.
            'cdi:fileSizeUofM':
              type: string
              description: Unit of measure for the file size (e.g., bytes, KB, MB, GB).
        - anyOf:
            - $ref: ../cdifDataCube/schema.yaml
            - $ref: ../cdifTabularData/schema.yaml
            - {}






$defs:
  cdifVariableMeasured:
    $ref: ../cdifVariableMeasured/schema.yaml
