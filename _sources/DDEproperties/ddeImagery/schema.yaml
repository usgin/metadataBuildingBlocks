---
$schema: https://json-schema.org/draft/2020-12/schema
title: DDE Imagery properties
description: Conditional extension for imagery resources with DDE-specific propertyIDs.
type: object
properties:
  'schema:additionalProperty':
    type: array
    description: Additional properties for imagery resources using DDE propertyIDs.
    minItems: 2
    items:
      $ref: '#/$defs/AdditionalProperty'
    allOf:
    - contains:
        type: object
        properties:
          'schema:propertyID':
            type: array
            contains:
              const: 'dde:sensorType'
          'schema:name':
            const: Sensor Type
          'schema:value':
            type: string
        required:
        - 'schema:propertyID'
        - 'schema:name'
        - 'schema:value'
      minContains: 1
    - contains:
        type: object
        properties:
          'schema:propertyID':
            type: array
            contains:
              const: 'dde:platform'
          'schema:name':
            const: Platform
          'schema:value':
            type: string
        required:
        - 'schema:propertyID'
        - 'schema:name'
        - 'schema:value'
      minContains: 1
required:
- 'schema:additionalProperty'
$defs:
  AdditionalProperty:
    $ref: ../../schemaorgProperties/additionalProperty/schema.yaml
