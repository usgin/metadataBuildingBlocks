---
$schema: https://json-schema.org/draft/2020-12/schema
title: DDE Imagery properties
description: Conditional extension for imagery resources with DDE-specific properties.
  Implements MD_Imagery entity (DDE spec Table 3) with 9 elements for sensor,
  platform, equipment, collector, temporal bounds, signal generator, wavelength,
  and processed level.
type: object
properties:
  'schema:additionalProperty':
    type: array
    description: Additional properties for imagery resources using DDE propertyIDs.
    items:
      $ref: '#/$defs/AdditionalProperty'
    contains:
      type: object
      properties:
        'schema:propertyID':
          type: array
          contains:
            enum:
            - 'dde:sensorType'
            - 'dde:platform'
            - 'dde:equipment'
            - 'dde:collector'
            - 'dde:signalGenerator'
            - 'dde:wavelength'
            - 'dde:processedLevel'
      required:
      - 'schema:propertyID'
  'schema:startTime':
    type: string
    description: Start time of the imagery acquisition. ISO 8601 date-time format.
  'schema:endTime':
    type: string
    description: End time of the imagery acquisition. ISO 8601 date-time format.
$defs:
  AdditionalProperty:
    $ref: ../../schemaorgProperties/additionalProperty/schema.yaml
