$schema: https://json-schema.org/draft/2020-12/schema
title: ADA XANES Product Profile
description: >-
  Technique-specific profile for X-ray Absorption Near Edge Structure (XANES) products.
  Extends the base ADA product profile with constraints on valid XANES component
  types.
allOf:
  - $ref: ../adaProduct/schema.yaml
  - type: object
    properties:
      "schema:additionalType":
        description: >-
          Must include a XANES product type identifier.
        contains:
          enum:
            - "X-ray Absorption Near Edge Structure Hyperspectral Image Stack (XANES)"
            - "X-ray absorption near edge structure (XANES) spectroscopy"
      "schema:distribution":
        items:
          oneOf:
            - required:
                - componentType
              properties:
                componentType:
                  anyOf:
                    - properties:
                        "@type":
                          enum:
                            - "ada:XANESImageStack"
                            - "ada:XANESStackOverviewImage"
                            - "ada:XANESRawTabular"
                            - "ada:XANESProcessedTabular"
                            - "ada:XANESimage"
                            - "ada:XANESCollection"
                    - $ref: ../adaProduct/schema.yaml#/$defs/universalComponentType
            - required:
                - "schema:hasPart"
              properties:
                "schema:hasPart":
                  items:
                    properties:
                      componentType:
                        anyOf:
                          - properties:
                              "@type":
                                enum:
                                  - "ada:XANESImageStack"
                                  - "ada:XANESStackOverviewImage"
                                  - "ada:XANESRawTabular"
                                  - "ada:XANESProcessedTabular"
                                  - "ada:XANESimage"
                                  - "ada:XANESCollection"
                          - $ref: ../adaProduct/schema.yaml#/$defs/universalComponentType
