$schema: https://json-schema.org/draft/2020-12/schema
title: ADA PSFD Product Profile
description: >-
  Technique-specific profile for Particle Size-Frequency Distribution (PSFD) products.
  Extends the base ADA product profile with constraints on valid PSFD component
  types and detailPSFD requirements.
allOf:
  - $ref: ../adaProduct/schema.yaml
  - type: object
    properties:
      "schema:additionalType":
        description: >-
          Must include a PSFD product type identifier.
        contains:
          enum:
            - "Particle Size Frequency Distribution (PSFD)"
            - "Particle Size Frequency Distribution"
      "schema:distribution":
        items:
          oneOf:
            - required:
                - componentType
              properties:
                componentType:
                  anyOf:
                    - properties:
                        "@type":
                          enum:
                            - "ada:PSFDTabular"
                    - $ref: ../adaProduct/schema.yaml#/$defs/universalComponentType
            - required:
                - "schema:hasPart"
              properties:
                "schema:hasPart":
                  items:
                    properties:
                      componentType:
                        anyOf:
                          - properties:
                              "@type":
                                enum:
                                  - "ada:PSFDTabular"
                          - $ref: ../adaProduct/schema.yaml#/$defs/universalComponentType
