$schema: https://json-schema.org/draft/2020-12/schema
title: ADA RAMAN Product Profile
description: >-
  Technique-specific profile for Raman Spectroscopy (RAMAN) products.
  Extends the base ADA product profile with constraints on valid RAMAN component
  types.
allOf:
  - $ref: ../adaProduct/schema.yaml
  - type: object
    properties:
      "schema:additionalType":
        description: >-
          Must include a RAMAN product type identifier.
        contains:
          const: "Raman vibrational spectroscopy"
      "schema:distribution":
        items:
          oneOf:
            - required:
                - componentType
              properties:
                componentType:
                  anyOf:
                    - properties:
                        "@type":
                          enum:
                            - "ada:RAMANRawTabular"
                    - $ref: ../adaProduct/schema.yaml#/$defs/universalComponentType
            - required:
                - "schema:hasPart"
              properties:
                "schema:hasPart":
                  items:
                    properties:
                      componentType:
                        anyOf:
                          - properties:
                              "@type":
                                enum:
                                  - "ada:RAMANRawTabular"
                          - $ref: ../adaProduct/schema.yaml#/$defs/universalComponentType
