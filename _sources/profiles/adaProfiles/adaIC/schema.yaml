$schema: https://json-schema.org/draft/2020-12/schema
title: ADA IC Product Profile
description: >-
  Technique-specific profile for Ion Chromatography (IC) products.
  Extends the base ADA product profile with constraints on valid IC component
  types.
allOf:
  - $ref: ../adaProduct/schema.yaml
  - type: object
    properties:
      "schema:additionalType":
        description: >-
          Must include a IC product type identifier.
        contains:
          enum:
            - "Ion Chromatography (IC)"
            - "Ion Chromatography"
      "schema:distribution":
        items:
          oneOf:
            - required:
                - componentType
              properties:
                componentType:
                  anyOf:
                    - properties:
                        "@type":
                          enum:
                            - "ada:ICTabular"
                    - $ref: ../adaProduct/schema.yaml#/$defs/universalComponentType
            - required:
                - "schema:hasPart"
              properties:
                "schema:hasPart":
                  items:
                    properties:
                      componentType:
                        anyOf:
                          - properties:
                              "@type":
                                enum:
                                  - "ada:ICTabular"
                          - $ref: ../adaProduct/schema.yaml#/$defs/universalComponentType
