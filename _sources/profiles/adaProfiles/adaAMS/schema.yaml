$schema: https://json-schema.org/draft/2020-12/schema
title: ADA AMS Product Profile
description: >-
  Technique-specific profile for Accelerator Mass Spectrometry (AMS) products.
  Extends the base ADA product profile with constraints on valid AMS component
  types.
allOf:
  - $ref: ../adaProduct/schema.yaml
  - type: object
    properties:
      "schema:additionalType":
        description: >-
          Must include a AMS product type identifier.
        contains:
          enum:
            - "Accelerator Mass Spectrometry (AMS)"
            - "Accelerator Mass Spectrometry"
      "schema:distribution":
        items:
          oneOf:
            - required:
                - componentType
              properties:
                componentType:
                  anyOf:
                    - properties:
                        "@type":
                          enum:
                            - "ada:AMSRawData"
                            - "ada:AMSProcessedData"
                    - $ref: ../adaProduct/schema.yaml#/$defs/universalComponentType
            - required:
                - "schema:hasPart"
              properties:
                "schema:hasPart":
                  items:
                    properties:
                      componentType:
                        anyOf:
                          - properties:
                              "@type":
                                enum:
                                  - "ada:AMSRawData"
                                  - "ada:AMSProcessedData"
                          - $ref: ../adaProduct/schema.yaml#/$defs/universalComponentType
