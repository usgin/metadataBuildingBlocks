$schema: https://json-schema.org/draft/2020-12/schema
title: ADA GC-MS Product Profile
description: >-
  Technique-specific profile for Gas Chromatography Mass Spectrometry (GC-MS) products.
  Extends the base ADA product profile with constraints on valid GC-MS component
  types.
allOf:
  - $ref: ../adaProduct/schema.yaml
  - type: object
    properties:
      "schema:additionalType":
        description: >-
          Must include a GC-MS product type identifier.
        contains:
          enum:
            - "Gas Chromatography-Mass Spectrometry (GCMS)"
            - "Gas Chromatography-Mass Spectrometry"
      "schema:distribution":
        items:
          oneOf:
            - required:
                - componentType
              properties:
                componentType:
                  anyOf:
                    - properties:
                        "@type":
                          enum:
                            - "ada:GCMSCollection"
                            - "ada:GCMSCube"
                            - "ada:GCGCMSCollection"
                    - $ref: ../adaProduct/schema.yaml#/$defs/universalComponentType
            - required:
                - "schema:hasPart"
              properties:
                "schema:hasPart":
                  items:
                    properties:
                      componentType:
                        anyOf:
                          - properties:
                              "@type":
                                enum:
                                  - "ada:GCMSCollection"
                                  - "ada:GCMSCube"
                                  - "ada:GCGCMSCollection"
                          - $ref: ../adaProduct/schema.yaml#/$defs/universalComponentType
