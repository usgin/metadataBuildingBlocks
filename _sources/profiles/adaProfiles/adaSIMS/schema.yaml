$schema: https://json-schema.org/draft/2020-12/schema
title: ADA SIMS Product Profile
description: >-
  Technique-specific profile for Secondary Ion Mass Spectrometry (SIMS) products.
  Extends the base ADA product profile with constraints on valid SIMS component
  types.
allOf:
  - $ref: ../adaProduct/schema.yaml
  - type: object
    properties:
      "schema:additionalType":
        description: >-
          Must include a SIMS product type identifier.
        contains:
          enum:
            - "Secondary Ion Mass Spectrometry (SIMS) Tabular"
            - "Secondary ion mass spectrometry"
      "schema:distribution":
        items:
          oneOf:
            - required:
                - componentType
              properties:
                componentType:
                  anyOf:
                    - properties:
                        "@type":
                          enum:
                            - "ada:SIMSTabular"
                            - "ada:SIMSCollection"
                    - $ref: ../adaProduct/schema.yaml#/$defs/universalComponentType
            - required:
                - "schema:hasPart"
              properties:
                "schema:hasPart":
                  items:
                    properties:
                      componentType:
                        anyOf:
                          - properties:
                              "@type":
                                enum:
                                  - "ada:SIMSTabular"
                                  - "ada:SIMSCollection"
                          - $ref: ../adaProduct/schema.yaml#/$defs/universalComponentType
