$schema: https://json-schema.org/draft/2020-12/schema
title: ADA SLS Product Profile
description: >-
  Technique-specific profile for Structured Light Scanning (SLS) products.
  Extends the base ADA product profile with constraints on valid SLS component
  types and detailSLS requirements.
allOf:
  - $ref: ../adaProduct/schema.yaml
  - type: object
    properties:
      "schema:additionalType":
        description: >-
          Must include a SLS product type identifier.
        contains:
          enum:
            - "Structured Light Scanning (SLS) Individual Scan Collection"
            - "Structured Light Scanning (SLS) Shape Model"
      "schema:distribution":
        items:
          oneOf:
            - required:
                - componentType
              properties:
                componentType:
                  anyOf:
                    - properties:
                        "@type":
                          enum:
                            - "ada:SLSShapeModel"
                            - "ada:SLSPartialScan"
                            - "ada:ShapeModelImage"
                    - $ref: ../adaProduct/schema.yaml#/$defs/universalComponentType
            - required:
                - "schema:hasPart"
              properties:
                "schema:hasPart":
                  items:
                    properties:
                      componentType:
                        anyOf:
                          - properties:
                              "@type":
                                enum:
                                  - "ada:SLSShapeModel"
                                  - "ada:SLSPartialScan"
                                  - "ada:ShapeModelImage"
                          - $ref: ../adaProduct/schema.yaml#/$defs/universalComponentType
