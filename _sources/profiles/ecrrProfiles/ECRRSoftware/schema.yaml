---
$schema: https://json-schema.org/draft/2020-12/schema
type: object
title: ECRR Software Profile
description: >-
  Complete ECRR metadata profile for software and application resources.
  Composes ecrrBase (mandatory identity and classification), ecrrCommon
  (optional shared properties), ecrrAssessment (maturity, lifetime, usage),
  and ecrrSoftware (application categories, languages, repositories, etc.).
  Resources must have schema:additionalType containing "EC Software".
allOf:
  - $ref: ../../../ecrrProperties/ecrrBase/schema.yaml
  - $ref: ../../../ecrrProperties/ecrrCommon/schema.yaml
  - $ref: ../../../ecrrProperties/ecrrAssessment/schema.yaml
  - $ref: ../../../ecrrProperties/ecrrSoftware/schema.yaml
  - properties:
      "schema:additionalType":
        contains:
          enum:
            - "EC Software"
