---
$schema: https://json-schema.org/draft/2020-12/schema
type: object
title: ECRR Semantic Resource Profile
description: >-
  Complete ECRR metadata profile for semantic resource types
  (ontologies, vocabularies, thesauri, etc.).
  Composes ecrrBase, ecrrCommon, ecrrAssessment, and ecrrSemanticResource.
  Resources must have schema:additionalType containing "EC Semantic Resource".
allOf:
  - $ref: ../../../ecrrProperties/ecrrBase/schema.yaml
  - $ref: ../../../ecrrProperties/ecrrCommon/schema.yaml
  - $ref: ../../../ecrrProperties/ecrrAssessment/schema.yaml
  - $ref: ../../../ecrrProperties/ecrrSemanticResource/schema.yaml
  - properties:
      "schema:additionalType":
        contains:
          enum:
            - "EC Semantic Resource"
