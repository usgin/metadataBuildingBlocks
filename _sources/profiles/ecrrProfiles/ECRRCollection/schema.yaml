---
$schema: https://json-schema.org/draft/2020-12/schema
type: object
title: ECRR Collection Profile
description: >-
  Complete ECRR metadata profile for bundled object (collection) resources.
  Composes ecrrBase, ecrrCommon, ecrrAssessment, and ecrrCollection.
  Resources must have schema:additionalType containing "EC Bundled Object".
allOf:
  - $ref: ../../../ecrrProperties/ecrrBase/schema.yaml
  - $ref: ../../../ecrrProperties/ecrrCommon/schema.yaml
  - $ref: ../../../ecrrProperties/ecrrAssessment/schema.yaml
  - $ref: ../../../ecrrProperties/ecrrCollection/schema.yaml
  - properties:
      "schema:additionalType":
        contains:
          enum:
            - "EC Bundled Object"
