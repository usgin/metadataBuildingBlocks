---
$schema: https://json-schema.org/draft/2020-12/schema
type: object
title: ECRR Platform Profile
description: >-
  Complete ECRR metadata profile for platform resources.
  Composes ecrrBase, ecrrCommon, and ecrrAssessment.
  Resources must have schema:additionalType containing "EC Platform".
allOf:
  - $ref: ../../../ecrrProperties/ecrrBase/schema.yaml
  - $ref: ../../../ecrrProperties/ecrrCommon/schema.yaml
  - $ref: ../../../ecrrProperties/ecrrAssessment/schema.yaml
  - properties:
      "schema:additionalType":
        contains:
          enum:
            - "EC Platform"
